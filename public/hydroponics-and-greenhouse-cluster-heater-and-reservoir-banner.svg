<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A heated greenhouse interior on one side and a hydroponic reservoir with a nutrient dosing bottle and EC meter on the other, representing the cluster's two complementary systems">
  <defs>
    <linearGradient id="hgBg" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#e4f0f5"/>
    </linearGradient>
    <linearGradient id="hgGlaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8dce8"/>
      <stop offset="100%" stop-color="#8fc4de"/>
    </linearGradient>
    <linearGradient id="hgReservoir" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5AA6C7"/>
      <stop offset="100%" stop-color="#316E8C"/>
    </linearGradient>
    <linearGradient id="hgWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7fc2de"/>
      <stop offset="100%" stop-color="#4A90B8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#hgBg)"/>
  <line x1="600" y1="40" x2="600" y2="360" stroke="#5C4433" stroke-width="2" stroke-dasharray="6 8" opacity="0.3"/>
  <rect x="0" y="330" width="1200" height="70" fill="#3D6647" opacity="0.1"/>

  <!-- LEFT: greenhouse hoop house -->
  <path d="M60 330 L60 220 Q60 110 300 110 Q540 110 540 220 L540 330 Z" fill="url(#hgGlaze)" opacity="0.75" stroke="#4A90B8" stroke-width="5"/>
  <path d="M170 330 L170 175 Q170 145 220 135" fill="none" stroke="#4A90B8" stroke-width="3" opacity="0.5"/>
  <path d="M300 330 L300 118" fill="none" stroke="#4A90B8" stroke-width="3" opacity="0.5"/>
  <path d="M430 330 L430 175 Q430 145 380 135" fill="none" stroke="#4A90B8" stroke-width="3" opacity="0.5"/>

  <!-- warm glow inside from heater -->
  <circle cx="300" cy="280" r="80" fill="#E8A94A" opacity="0.35"/>
  <g transform="translate(270,290)">
    <rect x="0" y="0" width="50" height="38" rx="5" fill="#8a95a0" stroke="#3a2810" stroke-width="3"/>
    <circle cx="25" cy="-10" r="13" fill="#E8734A" stroke="#3a2810" stroke-width="2.5"/>
    <path d="M12 -22 Q25 -35 38 -22" stroke="#E8734A" stroke-width="3" fill="none"/>
  </g>
  <!-- small plants inside -->
  <g fill="#4A7C59" stroke="#2c4d33" stroke-width="2">
    <path d="M120 330 Q108 305 120 288 Q132 305 120 330 Z"/>
    <path d="M180 330 Q168 300 180 280 Q192 300 180 330 Z"/>
    <path d="M420 330 Q408 300 420 280 Q432 300 420 330 Z"/>
    <path d="M470 330 Q458 305 470 288 Q482 305 470 330 Z"/>
  </g>

  <!-- RIGHT: hydroponic reservoir + dosing bottle + EC meter -->
  <g transform="translate(760,180)">
    <path d="M0 0 L220 0 L210 150 L10 150 Z" fill="url(#hgReservoir)" stroke="#3a2810" stroke-width="5"/>
    <ellipse cx="110" cy="0" rx="110" ry="16" fill="#7fc2de" stroke="#3a2810" stroke-width="4"/>
    <ellipse cx="110" cy="0" rx="110" ry="16" fill="url(#hgWater)" opacity="0.5"/>
    <rect x="10" y="60" width="200" height="8" fill="#2a5a72" opacity="0.5"/>
    <rect x="16" y="105" width="188" height="8" fill="#2a5a72" opacity="0.5"/>
  </g>

  <!-- dosing bottle -->
  <g transform="translate(1030,110)">
    <rect x="0" y="15" width="34" height="70" rx="5" fill="#E8A94A" stroke="#3a2810" stroke-width="4"/>
    <rect x="10" y="0" width="14" height="18" fill="#8a95a0" stroke="#3a2810" stroke-width="3"/>
    <text x="17" y="55" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#5C4433" text-anchor="middle">EC</text>
  </g>

  <!-- EC meter probe into reservoir -->
  <g transform="translate(870,78)">
    <rect x="0" y="0" width="16" height="90" rx="4" fill="#3D6647" stroke="#3a2810" stroke-width="3"/>
    <rect x="-10" y="-28" width="36" height="30" rx="4" fill="#F5F1E8" stroke="#3a2810" stroke-width="3"/>
    <text x="8" y="-8" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#5C4433" text-anchor="middle">1.8</text>
  </g>

  <ellipse cx="300" cy="332" rx="200" ry="12" fill="#2a1c0e" opacity="0.15"/>
  <ellipse cx="870" cy="332" rx="150" ry="12" fill="#2a1c0e" opacity="0.2"/>

  <text x="300" y="50" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5C4433" text-anchor="middle">Keep it warm</text>
  <text x="870" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5C4433" text-anchor="middle">Get the dose right</text>
</svg>
