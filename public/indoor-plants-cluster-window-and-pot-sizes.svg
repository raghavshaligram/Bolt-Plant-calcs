<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="A houseplant in bright light beside a window, next to three nursery pots of increasing size showing pot-sizing progression" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Background -->
  <rect width="800" height="500" fill="#EEF3E7"/>

  <!-- Left half: window with plant in bright light -->
  <g>
    <rect x="0" y="0" width="420" height="500" fill="#E4EDDA"/>
    <!-- window frame -->
    <rect x="60" y="50" width="260" height="260" rx="6" fill="#F5F1E8" stroke="#5C4433" stroke-width="6"/>
    <line x1="190" y1="50" x2="190" y2="310" stroke="#5C4433" stroke-width="5"/>
    <line x1="60" y1="180" x2="320" y2="180" stroke="#5C4433" stroke-width="5"/>
    <!-- sky/light glow in window panes -->
    <rect x="66" y="56" width="118" height="118" fill="#FCEFCB"/>
    <rect x="196" y="56" width="118" height="118" fill="#FCEFCB"/>
    <rect x="66" y="186" width="118" height="118" fill="#FCEFCB" opacity="0.7"/>
    <rect x="196" y="186" width="118" height="118" fill="#FCEFCB" opacity="0.7"/>
    <!-- sun rays -->
    <g stroke="#E8A94A" stroke-width="4" stroke-linecap="round" opacity="0.7">
      <line x1="340" y1="90" x2="380" y2="70"/>
      <line x1="345" y1="130" x2="390" y2="130"/>
      <line x1="340" y1="170" x2="380" y2="190"/>
    </g>

    <!-- plant on windowsill (fiddle-leaf-fig-like) -->
    <g transform="translate(190,420)">
      <path d="M-4 -140 C -40 -160 -50 -210 -20 -240 C -10 -200 0 -190 4 -180 C 10 -195 30 -215 20 -250 C 55 -215 45 -160 8 -135 Z" fill="#4A7C59"/>
      <path d="M-4 -140 C -30 -125 -45 -95 -30 -60 C -15 -85 -5 -100 0 -110 C 8 -95 20 -80 35 -55 C 50 -90 35 -125 8 -135 Z" fill="#3D6647"/>
      <rect x="-30" y="-60" width="60" height="60" rx="8" fill="#B8975C"/>
      <rect x="-30" y="-60" width="60" height="60" rx="8" fill="none" stroke="#5C4433" stroke-width="3"/>
    </g>
    <!-- windowsill -->
    <rect x="40" y="358" width="300" height="14" fill="#5C4433" opacity="0.5"/>
  </g>

  <!-- Right half: pot size progression -->
  <g>
    <rect x="420" y="0" width="380" height="500" fill="#F5F1E8"/>
    <text x="610" y="70" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#5C4433" text-anchor="middle">Sizing Up</text>

    <!-- small pot -->
    <g transform="translate(490,380)">
      <path d="M-22 0 L22 0 L16 -46 L-16 -46 Z" fill="#8B6535"/>
      <ellipse cx="0" cy="-46" rx="16" ry="5" fill="#6B4F35"/>
      <path d="M-6 -46 C -14 -70 -2 -85 0 -95 C 2 -85 14 -70 6 -46 Z" fill="#4A7C59"/>
    </g>
    <!-- medium pot -->
    <g transform="translate(610,390)">
      <path d="M-32 0 L32 0 L24 -66 L-24 -66 Z" fill="#8B6535"/>
      <ellipse cx="0" cy="-66" rx="24" ry="7" fill="#6B4F35"/>
      <path d="M-10 -66 C -22 -100 -4 -122 0 -136 C 4 -122 22 -100 10 -66 Z" fill="#4A7C59"/>
    </g>
    <!-- large pot -->
    <g transform="translate(740,405)">
      <path d="M-42 0 L42 0 L32 -88 L-32 -88 Z" fill="#8B6535"/>
      <ellipse cx="0" cy="-88" rx="32" ry="9" fill="#6B4F35"/>
      <path d="M-14 -88 C -30 -130 -6 -160 0 -178 C 6 -160 30 -130 14 -88 Z" fill="#3D6647"/>
    </g>

    <!-- arrow indicating progression -->
    <g stroke="#5C4433" stroke-width="3" fill="none" opacity="0.5">
      <path d="M540 260 L580 260" stroke-linecap="round"/>
      <path d="M572 253 L580 260 L572 267" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M660 260 L700 260" stroke-linecap="round"/>
      <path d="M692 253 L700 260 L692 267" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Divider -->
  <line x1="420" y1="0" x2="420" y2="500" stroke="#5C4433" stroke-width="3" opacity="0.25"/>
</svg>
