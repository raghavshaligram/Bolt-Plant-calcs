<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="A broadcast spreader sowing grass seed across a lawn, for calculating seeding rate">
  <!-- Background -->
  <rect width="800" height="500" fill="#F5F1E8"/>
  <rect x="0" y="0" width="800" height="190" fill="#EDE7D6"/>

  <!-- Distant hills -->
  <path d="M0 190 Q200 155 400 175 T800 180 V210 H0 Z" fill="#D4DCC4" opacity="0.5"/>

  <!-- Sun -->
  <circle cx="700" cy="80" r="30" fill="#F0D878" opacity="0.7"/>
  <circle cx="700" cy="80" r="22" fill="#F0C850" opacity="0.6"/>

  <!-- Ground / lawn -->
  <rect x="0" y="210" width="800" height="290" fill="#C8D9A8"/>

  <!-- Lawn stripes (mowing pattern) -->
  <g opacity="0.35">
    <rect x="0" y="210" width="100" height="290" fill="#B7CB93"/>
    <rect x="200" y="210" width="100" height="290" fill="#B7CB93"/>
    <rect x="400" y="210" width="100" height="290" fill="#B7CB93"/>
    <rect x="600" y="210" width="100" height="290" fill="#B7CB93"/>
  </g>

  <!-- Grass texture blades -->
  <g fill="#8FAE66" opacity="0.6">
    <path d="M60 300 Q58 288 60 278 Q62 288 60 300Z"/>
    <path d="M140 340 Q138 328 140 318 Q142 328 140 340Z"/>
    <path d="M320 310 Q318 298 320 288 Q322 298 320 310Z"/>
    <path d="M480 350 Q478 338 480 328 Q482 338 480 350Z"/>
    <path d="M560 300 Q558 288 560 278 Q562 288 560 300Z"/>
    <path d="M690 330 Q688 318 690 308 Q692 318 690 330Z"/>
  </g>

  <!-- Person pushing a broadcast spreader -->
  <g transform="translate(280, 230)">
    <!-- Spreader hopper -->
    <path d="M40 120 L110 120 L100 155 L50 155 Z" fill="#3A6B3A"/>
    <rect x="45" y="108" width="60" height="14" rx="3" fill="#4E8A4E"/>
    <!-- Spreader wheel -->
    <circle cx="75" cy="168" r="14" fill="#5A5A5A"/>
    <circle cx="75" cy="168" r="6" fill="#8A8A8A"/>
    <!-- Handle -->
    <line x1="95" y1="112" x2="150" y2="40" stroke="#8B6535" stroke-width="6" stroke-linecap="round"/>
    <!-- Seed fan pattern from spreader -->
    <g fill="#C9A24A" opacity="0.85">
      <circle cx="20" cy="150" r="2.2"/>
      <circle cx="8" cy="162" r="2"/>
      <circle cx="0" cy="145" r="2.4"/>
      <circle cx="-10" cy="160" r="2"/>
      <circle cx="15" cy="170" r="2.2"/>
      <circle cx="-5" cy="175" r="2"/>
      <circle cx="28" cy="165" r="2.3"/>
      <circle cx="-15" cy="150" r="2"/>
      <circle cx="35" cy="150" r="2"/>
    </g>

    <!-- Person: legs -->
    <path d="M148 40 L140 100 L132 148" stroke="#3A4A2A" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M148 40 L158 100 L162 148" stroke="#3A4A2A" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- Boots -->
    <ellipse cx="130" cy="152" rx="10" ry="6" fill="#5A4530"/>
    <ellipse cx="164" cy="152" rx="10" ry="6" fill="#5A4530"/>
    <!-- Torso -->
    <path d="M150 -30 L148 42 L110 40 L118 -32 Z" fill="#6B8E4E"/>
    <!-- Arm to handle -->
    <path d="M132 -10 L100 30" stroke="#6B8E4E" stroke-width="9" stroke-linecap="round"/>
    <path d="M148 -10 L155 35" stroke="#6B8E4E" stroke-width="9" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="133" cy="-45" r="18" fill="#E0AE82"/>
    <!-- Hat -->
    <path d="M112 -55 Q133 -75 154 -55 L154 -50 L112 -50 Z" fill="#3A4A2A"/>
    <rect x="108" y="-52" width="50" height="8" rx="4" fill="#3A4A2A"/>
  </g>

  <!-- Seed pile / bag near the edge -->
  <g transform="translate(560, 380)">
    <rect x="0" y="0" width="70" height="90" rx="6" fill="#E8C060"/>
    <rect x="0" y="0" width="70" height="26" rx="6" fill="#D9AE4A"/>
    <text x="35" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#3A4A2A" text-anchor="middle">SEED</text>
    <text x="35" y="55" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#5A4B20" text-anchor="middle">50 lb</text>
    <line x1="10" y1="65" x2="60" y2="65" stroke="#5A4B20" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="75" x2="60" y2="75" stroke="#5A4B20" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Coverage measurement indicator -->
  <g>
    <line x1="120" y1="440" x2="640" y2="440" stroke="#3A4A2A" stroke-width="2" stroke-dasharray="4 3"/>
    <line x1="120" y1="434" x2="120" y2="446" stroke="#3A4A2A" stroke-width="2" stroke-linecap="round"/>
    <line x1="640" y1="434" x2="640" y2="446" stroke="#3A4A2A" stroke-width="2" stroke-linecap="round"/>
    <rect x="340" y="452" width="90" height="22" rx="4" fill="#3A4A2A"/>
    <text x="385" y="467" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#F5F1E8" text-anchor="middle">1,000 sq ft</text>
  </g>
</svg>
