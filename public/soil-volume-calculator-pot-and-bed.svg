<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Soil volume being calculated for both a round pot and a rectangular bed">
  <!-- Background -->
  <rect width="800" height="500" fill="#F5F1E8"/>
  <rect x="0" y="0" width="800" height="165" fill="#EDE7D6"/>

  <!-- Distant hills -->
  <path d="M0 165 Q160 135 320 155 T640 148 T800 158 V182 H0 Z" fill="#D4DCC4" opacity="0.5"/>

  <!-- Ground -->
  <rect x="0" y="420" width="800" height="80" fill="#C8D9A8"/>

  <!-- Sun -->
  <circle cx="720" cy="72" r="28" fill="#F0D878" opacity="0.7"/>
  <circle cx="720" cy="72" r="20" fill="#F0C850" opacity="0.6"/>

  <!-- Subtle center divider -->
  <line x1="400" y1="175" x2="400" y2="420" stroke="#D4C9B0" stroke-width="1" stroke-dasharray="5 5" opacity="0.5"/>

  <!-- ========= LEFT SIDE: RECTANGULAR BED ========= -->

  <!-- Corner posts -->
  <rect x="52" y="258" width="18" height="148" rx="4" fill="#8B6535"/>
  <rect x="330" y="258" width="18" height="148" rx="4" fill="#8B6535"/>

  <!-- Back top edge -->
  <rect x="64" y="262" width="278" height="14" rx="3" fill="#B8975C"/>

  <!-- Side board fill -->
  <rect x="64" y="270" width="278" height="106" fill="#C8A87C"/>

  <!-- Wood grain lines -->
  <line x1="136" y1="278" x2="136" y2="362" stroke="#A8855A" stroke-width="1.5" opacity="0.4"/>
  <line x1="206" y1="278" x2="206" y2="362" stroke="#A8855A" stroke-width="1.5" opacity="0.4"/>
  <line x1="276" y1="278" x2="276" y2="362" stroke="#A8855A" stroke-width="1.5" opacity="0.4"/>

  <!-- Front face -->
  <rect x="64" y="372" width="278" height="22" rx="4" fill="#A87F4A"/>

  <!-- Soil inside bed -->
  <rect x="70" y="278" width="266" height="94" fill="#6B4F35"/>

  <!-- Soil surface dots -->
  <g fill="#7A5C3E" opacity="0.8">
    <circle cx="96"  cy="286" r="3"/>
    <circle cx="122" cy="292" r="2.5"/>
    <circle cx="148" cy="284" r="3"/>
    <circle cx="174" cy="290" r="2.5"/>
    <circle cx="200" cy="286" r="3"/>
    <circle cx="226" cy="292" r="2.5"/>
    <circle cx="252" cy="284" r="3"/>
    <circle cx="278" cy="290" r="2.5"/>
    <circle cx="304" cy="286" r="3"/>
  </g>

  <!-- Small plants in bed -->
  <path d="M120 278 Q115 257 113 242 Q116 240 119 242 Q122 257 120 278 Z" fill="#4A7C2F"/>
  <path d="M120 278 Q113 267 107 259 Q110 256 113 259 Q118 267 120 278 Z" fill="#5A8C3F"/>
  <path d="M203 278 Q198 252 196 234 Q199 232 202 234 Q205 252 203 278 Z" fill="#4A7C2F"/>
  <path d="M203 278 Q211 261 217 251 Q220 249 218 253 Q212 263 203 278 Z" fill="#5A8C3F"/>
  <path d="M286 278 Q281 257 279 242 Q282 240 285 242 Q288 257 286 278 Z" fill="#4A7C2F"/>
  <path d="M286 278 Q278 264 272 255 Q275 252 278 255 Q283 264 286 278 Z" fill="#5A8C3F"/>

  <!-- Depth indicator (right side of bed, in center gap) -->
  <line x1="364" y1="278" x2="364" y2="372" stroke="#3A4A2A" stroke-width="1.8" stroke-dasharray="4 3"/>
  <line x1="358" y1="278" x2="370" y2="278" stroke="#3A4A2A" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="358" y1="372" x2="370" y2="372" stroke="#3A4A2A" stroke-width="1.8" stroke-linecap="round"/>
  <rect x="373" y="316" width="50" height="20" rx="4" fill="#3A4A2A"/>
  <text x="398" y="330" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#F5F1E8" text-anchor="middle">depth</text>

  <!-- "Rectangle" label badge -->
  <rect x="96" y="230" width="84" height="22" rx="5" fill="#3A4A2A"/>
  <text x="138" y="245" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#F5F1E8" text-anchor="middle">Rectangle</text>

  <!-- ========= RIGHT SIDE: CYLINDRICAL POT ========= -->

  <!-- Pot body (tapered trapezoid) -->
  <path d="M470 290 L480 408 L700 408 L710 290 Z" fill="#D2683A"/>
  <!-- Pot left shading -->
  <path d="M470 290 L480 408 L500 408 L490 290 Z" fill="#B85228" opacity="0.45"/>
  <!-- Pot right highlight -->
  <path d="M710 290 L700 408 L686 408 L696 290 Z" fill="#F07848" opacity="0.3"/>

  <!-- Pot base -->
  <ellipse cx="590" cy="408" rx="110" ry="14" fill="#A84820"/>

  <!-- Pot rim ellipse -->
  <ellipse cx="590" cy="290" rx="120" ry="24" fill="#B85228"/>
  <ellipse cx="590" cy="290" rx="110" ry="19" fill="#E07040"/>

  <!-- Soil inside pot (top-view ellipse) -->
  <ellipse cx="590" cy="312" rx="105" ry="18" fill="#6B4F35"/>
  <ellipse cx="590" cy="311" rx="104" ry="17" fill="#7A5C3E" opacity="0.65"/>
  <g fill="#8B6535" opacity="0.75">
    <circle cx="548" cy="310" r="2.5"/>
    <circle cx="567" cy="314" r="2"/>
    <circle cx="588" cy="308" r="2.5"/>
    <circle cx="609" cy="314" r="2"/>
    <circle cx="628" cy="310" r="2.5"/>
  </g>

  <!-- Plant in pot -->
  <path d="M590 310 Q583 284 580 264 Q584 261 588 264 Q591 283 590 310 Z" fill="#4A7C2F"/>
  <path d="M590 310 Q600 288 607 270 Q610 268 608 272 Q602 290 590 310 Z" fill="#5A8C3F"/>
  <path d="M590 310 Q580 288 573 270 Q570 268 572 272 Q578 290 590 310 Z" fill="#5A8C3F"/>

  <!-- Depth indicator (right side of pot) -->
  <line x1="722" y1="312" x2="722" y2="406" stroke="#3A4A2A" stroke-width="1.8" stroke-dasharray="4 3"/>
  <line x1="716" y1="312" x2="728" y2="312" stroke="#3A4A2A" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="716" y1="406" x2="728" y2="406" stroke="#3A4A2A" stroke-width="1.8" stroke-linecap="round"/>
  <rect x="733" y="350" width="50" height="20" rx="4" fill="#3A4A2A"/>
  <text x="758" y="364" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#F5F1E8" text-anchor="middle">depth</text>

  <!-- "Cylinder / Pot" label badge -->
  <rect x="526" y="230" width="128" height="22" rx="5" fill="#3A4A2A"/>
  <text x="590" y="245" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#F5F1E8" text-anchor="middle">Cylinder / Pot</text>

  <!-- Grass tufts on ground -->
  <g fill="#9AB870" opacity="0.7">
    <path d="M40 420 Q38 413 40 408 Q42 413 40 420 Z"/>
    <path d="M46 420 Q44 411 46 406 Q48 411 46 420 Z"/>
    <path d="M190 420 Q188 413 190 408 Q192 413 190 420 Z"/>
    <path d="M430 420 Q428 413 430 408 Q432 413 430 420 Z"/>
    <path d="M760 420 Q758 413 760 408 Q762 413 760 420 Z"/>
  </g>
</svg>
