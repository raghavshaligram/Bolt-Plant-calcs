<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Cross-section of a garden bed showing mulch on top, garden soil beneath it, and bulk topsoil fill at the bottom, with compost worked into the upper layer">
  <!-- Background -->
  <rect width="800" height="500" fill="#F5F1E8"/>
  <rect x="0" y="0" width="800" height="120" fill="#EDE7D6"/>

  <!-- Sun -->
  <circle cx="700" cy="70" r="26" fill="#F0D878" opacity="0.7"/>
  <circle cx="700" cy="70" r="18" fill="#F0C850" opacity="0.6"/>

  <!-- Raised bed frame -->
  <g>
    <rect x="106" y="150" width="18" height="300" rx="4" fill="#8B6535"/>
    <rect x="676" y="150" width="18" height="300" rx="4" fill="#8B6535"/>
    <rect x="106" y="432" width="588" height="24" rx="4" fill="#8B6535"/>
  </g>

  <!-- Layer 1: bulk topsoil fill (bottom) -->
  <rect x="124" y="330" width="552" height="102" fill="#B8975C"/>
  <g fill="#A87F4A" opacity="0.55">
    <circle cx="160" cy="360" r="4"/>
    <circle cx="210" cy="380" r="3.5"/>
    <circle cx="260" cy="350" r="4"/>
    <circle cx="310" cy="400" r="3.5"/>
    <circle cx="360" cy="370" r="4"/>
    <circle cx="410" cy="345" r="3.5"/>
    <circle cx="460" cy="395" r="4"/>
    <circle cx="510" cy="365" r="3.5"/>
    <circle cx="560" cy="385" r="4"/>
    <circle cx="610" cy="355" r="3.5"/>
    <circle cx="650" cy="405" r="4"/>
  </g>

  <!-- Layer 2: garden soil (amended, darker + compost flecks) -->
  <rect x="124" y="255" width="552" height="75" fill="#6B4F35"/>
  <g fill="#3A4A2A" opacity="0.7">
    <circle cx="150" cy="275" r="3"/>
    <circle cx="185" cy="295" r="2.5"/>
    <circle cx="230" cy="270" r="3"/>
    <circle cx="270" cy="305" r="2.5"/>
    <circle cx="320" cy="280" r="3"/>
    <circle cx="365" cy="300" r="2.5"/>
    <circle cx="410" cy="265" r="3"/>
    <circle cx="455" cy="298" r="2.5"/>
    <circle cx="500" cy="278" r="3"/>
    <circle cx="545" cy="305" r="2.5"/>
    <circle cx="590" cy="272" r="3"/>
    <circle cx="630" cy="300" r="2.5"/>
  </g>

  <!-- Layer 3: mulch (top) -->
  <rect x="124" y="228" width="552" height="27" fill="#7A5C3E"/>
  <g fill="#5C4433" opacity="0.8">
    <ellipse cx="155" cy="238" rx="9" ry="4"/>
    <ellipse cx="200" cy="244" rx="8" ry="3.5"/>
    <ellipse cx="245" cy="236" rx="9" ry="4"/>
    <ellipse cx="295" cy="242" rx="8" ry="3.5"/>
    <ellipse cx="340" cy="237" rx="9" ry="4"/>
    <ellipse cx="390" cy="244" rx="8" ry="3.5"/>
    <ellipse cx="435" cy="236" rx="9" ry="4"/>
    <ellipse cx="480" cy="242" rx="8" ry="3.5"/>
    <ellipse cx="525" cy="237" rx="9" ry="4"/>
    <ellipse cx="575" cy="243" rx="8" ry="3.5"/>
    <ellipse cx="620" cy="236" rx="9" ry="4"/>
    <ellipse cx="650" cy="242" rx="8" ry="3.5"/>
  </g>

  <!-- Small seedling planted through the layers -->
  <g transform="translate(400, 228)">
    <path d="M0 0 C-4 -18 -14 -26 -22 -28 C-12 -22 -4 -14 0 0 Z" fill="#6E9A5A"/>
    <path d="M0 0 C4 -20 15 -30 24 -32 C13 -24 4 -14 0 0 Z" fill="#7FAE68"/>
    <path d="M0 0 C-1 -12 0 -22 0 -30" stroke="#4E7040" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Layer labels (right side, pointing at each band) -->
  <g font-family="Inter, sans-serif" font-size="15" font-weight="600">
    <line x1="676" y1="240" x2="712" y2="240" stroke="#3A4A2A" stroke-width="1.5"/>
    <text x="716" y="245" fill="#3A4A2A">Mulch</text>

    <line x1="676" y1="292" x2="712" y2="292" stroke="#3A4A2A" stroke-width="1.5"/>
    <text x="716" y="297" fill="#3A4A2A">Garden soil</text>

    <line x1="676" y1="381" x2="712" y2="381" stroke="#3A4A2A" stroke-width="1.5"/>
    <text x="716" y="386" fill="#3A4A2A">Topsoil fill</text>
  </g>

  <!-- Ground line + grass either side of the bed -->
  <rect x="0" y="456" width="800" height="44" fill="#C8D9A8"/>
  <g fill="#9AB870" opacity="0.7">
    <path d="M40 456 Q38 448 40 442 Q42 448 40 456 Z"/>
    <path d="M60 456 Q58 450 60 444 Q62 450 60 456 Z"/>
    <path d="M740 456 Q738 448 740 442 Q742 448 740 456 Z"/>
    <path d="M760 456 Q758 450 760 444 Q762 450 760 456 Z"/>
  </g>
</svg>
