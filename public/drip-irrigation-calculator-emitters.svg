<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="A drip irrigation line with emitters dripping water onto plants along a garden row">
  <!-- Background -->
  <rect width="800" height="500" fill="#F5F1E8"/>
  <rect x="0" y="0" width="800" height="190" fill="#EDE7D6"/>
  <path d="M0 190 Q200 155 400 175 T800 180 V210 H0 Z" fill="#D4DCC4" opacity="0.5"/>
  <circle cx="700" cy="80" r="30" fill="#F0D878" opacity="0.7"/>
  <circle cx="700" cy="80" r="22" fill="#F0C850" opacity="0.6"/>

  <!-- Ground -->
  <rect x="0" y="420" width="800" height="80" fill="#C8D9A8"/>

  <!-- Drip line (poly tubing) running across the bed -->
  <path d="M60 300 H740" stroke="#6B7A56" stroke-width="10" stroke-linecap="round"/>
  <path d="M60 300 H740" stroke="#8FA06E" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Emitters + drips + plants along the line -->
  <g>
    <!-- Plant 1 -->
    <g transform="translate(140,300)">
      <circle r="8" fill="#F5F1E8" stroke="#3A4A2A" stroke-width="2"/>
      <path d="M0 -2 Q-3 20 -8 34 M0 -2 Q3 20 8 34 M0 -2 V38" stroke="#3A4A2A" stroke-width="1.6" fill="none" transform="translate(0,60)"/>
      <path d="M0 34 Q-16 24 -22 34 Q-14 40 0 34ZM0 34 Q16 24 22 34 Q14 40 0 34Z" fill="#6B8E4E" transform="translate(0,80)"/>
      <line x1="0" y1="8" x2="0" y2="26" stroke="#3A6EA5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="30" r="3.5" fill="#5B9BD5"/>
    </g>
    <!-- Plant 2 -->
    <g transform="translate(300,300)">
      <circle r="8" fill="#F5F1E8" stroke="#3A4A2A" stroke-width="2"/>
      <path d="M0 34 Q-16 24 -22 34 Q-14 40 0 34ZM0 34 Q16 24 22 34 Q14 40 0 34Z" fill="#6B8E4E" transform="translate(0,80)"/>
      <line x1="0" y1="8" x2="0" y2="26" stroke="#3A6EA5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="30" r="3.5" fill="#5B9BD5"/>
    </g>
    <!-- Plant 3 -->
    <g transform="translate(460,300)">
      <circle r="8" fill="#F5F1E8" stroke="#3A4A2A" stroke-width="2"/>
      <path d="M0 34 Q-16 24 -22 34 Q-14 40 0 34ZM0 34 Q16 24 22 34 Q14 40 0 34Z" fill="#6B8E4E" transform="translate(0,80)"/>
      <line x1="0" y1="8" x2="0" y2="26" stroke="#3A6EA5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="30" r="3.5" fill="#5B9BD5"/>
    </g>
    <!-- Plant 4 -->
    <g transform="translate(620,300)">
      <circle r="8" fill="#F5F1E8" stroke="#3A4A2A" stroke-width="2"/>
      <path d="M0 34 Q-16 24 -22 34 Q-14 40 0 34ZM0 34 Q16 24 22 34 Q14 40 0 34Z" fill="#6B8E4E" transform="translate(0,80)"/>
      <line x1="0" y1="8" x2="0" y2="26" stroke="#3A6EA5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="30" r="3.5" fill="#5B9BD5"/>
    </g>
  </g>

  <!-- Timer/valve box illustration, lower left -->
  <g transform="translate(90,340)">
    <rect x="0" y="0" width="90" height="70" rx="8" fill="#B5652F" opacity="0.9"/>
    <rect x="10" y="10" width="70" height="28" rx="4" fill="#F5F1E8"/>
    <text x="45" y="30" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#3A4A2A" text-anchor="middle">1 GPH</text>
    <circle cx="20" cy="55" r="6" fill="#3A4A2A"/>
    <circle cx="45" cy="55" r="6" fill="#3A4A2A"/>
    <circle cx="70" cy="55" r="6" fill="#3A4A2A"/>
  </g>

  <!-- Watering can / measuring illustration, lower right -->
  <g transform="translate(600,340)">
    <rect x="0" y="20" width="110" height="50" rx="8" fill="#F5F1E8" stroke="#3A4A2A" stroke-width="2"/>
    <line x1="10" y1="35" x2="100" y2="35" stroke="#8FA06E" stroke-width="2"/>
    <line x1="10" y1="50" x2="100" y2="50" stroke="#8FA06E" stroke-width="2"/>
    <text x="55" y="15" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#3A4A2A" text-anchor="middle">Run time</text>
    <text x="55" y="63" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#3A6EA5" text-anchor="middle">60 min</text>
  </g>
</svg>
