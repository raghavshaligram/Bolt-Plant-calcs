<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgh3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <linearGradient id="soilBuf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A5A3A"/>
      <stop offset="100%" stop-color="#4E3822"/>
    </linearGradient>
    <linearGradient id="waterTank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FC4DE"/>
      <stop offset="100%" stop-color="#4A90B8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgh3)"/>
  <line x1="200" y1="30" x2="200" y2="220" stroke="#c9b896" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- soil-grown: plant in soil, buffered -->
  <rect x="30" y="170" width="140" height="45" fill="url(#soilBuf)"/>
  <rect x="90" y="130" width="8" height="40" fill="#3D6647"/>
  <ellipse cx="80" cy="115" rx="18" ry="11" fill="#4A7C59"/>
  <ellipse cx="105" cy="112" rx="16" ry="10" fill="#5a8f63"/>
  <circle cx="100" cy="192" r="55" fill="none" stroke="#8B6535" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.5"/>
  <text x="100" y="230" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#5C4433" text-anchor="middle">Soil: buffers small mistakes</text>

  <!-- hydroponic: plant in clear water, precise dosing needed -->
  <rect x="230" y="170" width="140" height="45" rx="6" fill="url(#waterTank)" opacity="0.8"/>
  <path d="M245 185 Q265 180 285 185 T325 185 T365 185" stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.5"/>
  <rect x="296" y="130" width="8" height="40" fill="#3D6647"/>
  <ellipse cx="286" cy="115" rx="18" ry="11" fill="#4A7C59"/>
  <ellipse cx="311" cy="112" rx="16" ry="10" fill="#5a8f63"/>
  <text x="300" y="230" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#5C4433" text-anchor="middle">Hydroponic: no buffer at all</text>
</svg>
