<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Soil being added to a raised garden bed, showing fill depth">
  <!-- Sky background -->
  <rect width="800" height="500" fill="#F5F1E8"/>
  <rect x="0" y="0" width="800" height="195" fill="#EDE7D6"/>

  <!-- Distant hills -->
  <path d="M0 195 Q180 162 380 178 T760 172 T800 178 V210 H0 Z" fill="#D4DCC4" opacity="0.5"/>

  <!-- Sun -->
  <circle cx="714" cy="78" r="30" fill="#F0D878" opacity="0.7"/>
  <circle cx="714" cy="78" r="21" fill="#F0C850" opacity="0.6"/>

  <!-- Ground -->
  <rect x="0" y="432" width="800" height="68" fill="#C8D9A8"/>
  <!-- Grass tufts -->
  <g fill="#9AB870" opacity="0.7">
    <path d="M38 432 Q36 424 38 418 Q40 424 38 432 Z"/>
    <path d="M44 432 Q42 422 44 416 Q46 422 44 432 Z"/>
    <path d="M180 432 Q178 424 180 418 Q182 424 180 432 Z"/>
    <path d="M390 432 Q388 424 390 418 Q392 424 390 432 Z"/>
    <path d="M750 432 Q748 424 750 418 Q752 424 750 432 Z"/>
    <path d="M756 432 Q754 422 756 416 Q758 422 756 432 Z"/>
  </g>

  <!-- ===== RAISED BED FRAME ===== -->
  <!-- Corner posts -->
  <rect x="82"  y="278" width="20" height="158" rx="5" fill="#8B6535"/>
  <rect x="638" y="278" width="20" height="158" rx="5" fill="#8B6535"/>

  <!-- Back top plank -->
  <rect x="96" y="280" width="548" height="16" rx="4" fill="#B8975C"/>

  <!-- Side wall planks -->
  <rect x="96" y="290" width="548" height="110" fill="#C8A87C"/>

  <!-- Wood grain vertical lines -->
  <line x1="188" y1="296" x2="188" y2="388" stroke="#A8855A" stroke-width="1.5" opacity="0.4"/>
  <line x1="280" y1="296" x2="280" y2="388" stroke="#A8855A" stroke-width="1.5" opacity="0.4"/>
  <line x1="372" y1="296" x2="372" y2="388" stroke="#A8855A" stroke-width="1.5" opacity="0.4"/>
  <line x1="464" y1="296" x2="464" y2="388" stroke="#A8855A" stroke-width="1.5" opacity="0.4"/>
  <line x1="556" y1="296" x2="556" y2="388" stroke="#A8855A" stroke-width="1.5" opacity="0.4"/>

  <!-- Front bottom plank -->
  <rect x="96" y="400" width="548" height="24" rx="4" fill="#A87F4A"/>

  <!-- ===== SOIL INSIDE BED ===== -->
  <!-- Empty air gap at top (showing partial fill) -->
  <rect x="102" y="296" width="536" height="32" fill="#EDE7D6" opacity="0.6"/>
  <!-- Soil fill layer -->
  <rect x="102" y="328" width="536" height="72" fill="#6B4F35"/>
  <!-- Soil surface texture dots -->
  <g fill="#7A5C3E" opacity="0.85">
    <circle cx="128" cy="336" r="3.5"/>
    <circle cx="156" cy="332" r="3"/>
    <circle cx="184" cy="337" r="3.5"/>
    <circle cx="212" cy="333" r="3"/>
    <circle cx="240" cy="337" r="3.5"/>
    <circle cx="268" cy="332" r="3"/>
    <circle cx="296" cy="337" r="3.5"/>
    <circle cx="324" cy="333" r="3"/>
    <circle cx="352" cy="337" r="3.5"/>
    <circle cx="380" cy="332" r="3"/>
    <circle cx="408" cy="337" r="3.5"/>
    <circle cx="436" cy="333" r="3"/>
    <circle cx="464" cy="337" r="3.5"/>
    <circle cx="492" cy="332" r="3"/>
    <circle cx="520" cy="337" r="3.5"/>
    <circle cx="548" cy="333" r="3"/>
    <circle cx="576" cy="337" r="3.5"/>
    <circle cx="610" cy="333" r="3"/>
  </g>

  <!-- Fill depth label badge -->
  <rect x="130" y="335" width="88" height="20" rx="5" fill="#3A4A2A" opacity="0.88"/>
  <text x="174" y="349" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#F5F1E8" text-anchor="middle">soil fill</text>

  <!-- ===== DEPTH MEASUREMENT ===== -->
  <!-- Dashed vertical line inside the bed, right side -->
  <line x1="672" y1="296" x2="672" y2="400" stroke="#3A4A2A" stroke-width="2" stroke-dasharray="5 4"/>
  <!-- Top tick -->
  <line x1="665" y1="296" x2="679" y2="296" stroke="#3A4A2A" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom tick -->
  <line x1="665" y1="400" x2="679" y2="400" stroke="#3A4A2A" stroke-width="2" stroke-linecap="round"/>
  <!-- Depth badge -->
  <rect x="682" y="335" width="60" height="26" rx="5" fill="#3A4A2A"/>
  <text x="712" y="352" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#F5F1E8" text-anchor="middle">10 in</text>

  <!-- Air gap label -->
  <rect x="682" y="290" width="60" height="22" rx="5" fill="#6B8A50" opacity="0.85"/>
  <text x="712" y="305" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#F5F1E8" text-anchor="middle">air gap</text>

  <!-- ===== SOIL BAG BEING POURED ===== -->
  <!-- Bag body -->
  <path d="M460 188 Q455 175 462 165 L510 155 Q520 152 525 162 Q530 175 524 190 Z" fill="#8BAA6A"/>
  <rect x="462" y="188" width="62" height="52" rx="6" fill="#7A9A5A"/>
  <!-- Bag label stripe -->
  <rect x="466" y="202" width="54" height="22" rx="3" fill="#F5F1E8" opacity="0.85"/>
  <text x="493" y="217" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#4A6A30" text-anchor="middle">RAISED BED</text>
  <!-- Bag bottom sealed -->
  <rect x="462" y="234" width="62" height="8" rx="4" fill="#5A7A3A" opacity="0.7"/>

  <!-- Soil pouring stream from bag -->
  <path d="M490 240 Q487 262 483 284 Q480 304 478 328" stroke="#6B4F35" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
  <path d="M497 242 Q494 264 491 286 Q489 306 488 328" stroke="#7A5C3E" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M504 244 Q502 266 500 288 Q498 308 497 328" stroke="#6B4F35" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- Hand holding bag -->
  <ellipse cx="520" cy="165" rx="14" ry="9" fill="#D4A87A" opacity="0.85"/>
  <path d="M514 161 Q518 155 524 157 Q530 159 526 165" fill="#C49060" opacity="0.7"/>
</svg>
