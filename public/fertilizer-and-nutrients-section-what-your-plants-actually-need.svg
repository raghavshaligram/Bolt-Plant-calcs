<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgf1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgf1)"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#c9b896" stroke-width="1" opacity="0.6"/>

  <!-- plant with labeled N (leaves), P (flower/root), K (overall) -->
  <line x1="200" y1="200" x2="200" y2="90" stroke="#3D6647" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="160" cy="115" rx="34" ry="17" fill="#4A7C59" transform="rotate(-20 160 115)"/>
  <ellipse cx="240" cy="105" rx="34" ry="17" fill="#5a8f63" transform="rotate(20 240 105)"/>
  <ellipse cx="165" cy="155" rx="30" ry="15" fill="#4A7C59" transform="rotate(-15 165 155)"/>
  <ellipse cx="235" cy="150" rx="30" ry="15" fill="#5a8f63" transform="rotate(15 235 150)"/>
  <circle cx="200" cy="85" r="13" fill="#E8A94A"/>
  <circle cx="200" cy="85" r="5" fill="#B8752E"/>
  <path d="M200 200 Q180 218 165 225 M200 200 Q220 218 235 225 M200 200 Q200 225 200 232" stroke="#B8752E" stroke-width="3" fill="none"/>
  <circle cx="200" cy="150" r="70" fill="none" stroke="#4A90B8" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.4"/>

  <!-- labels -->
  <text x="105" y="105" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#3D6647">N</text>
  <text x="105" y="122" font-family="Arial, sans-serif" font-size="9" fill="#5C4433">leaves</text>
  <text x="275" y="90" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#B8752E">P</text>
  <text x="275" y="107" font-family="Arial, sans-serif" font-size="9" fill="#5C4433">roots/flowers</text>
  <text x="320" y="155" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#4A90B8">K</text>
  <text x="320" y="172" font-family="Arial, sans-serif" font-size="9" fill="#5C4433">vigor</text>
</svg>
