<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgs2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <linearGradient id="traySoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B4C30"/>
      <stop offset="100%" stop-color="#3E2C18"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgs2)"/>

  <!-- seed tray -->
  <rect x="60" y="140" width="280" height="70" rx="6" fill="#8a95a0"/>
  <g>
    <rect x="70" y="148" width="55" height="55" rx="4" fill="url(#traySoil)"/>
    <rect x="132" y="148" width="55" height="55" rx="4" fill="url(#traySoil)"/>
    <rect x="194" y="148" width="55" height="55" rx="4" fill="url(#traySoil)"/>
    <rect x="256" y="148" width="55" height="55" rx="4" fill="url(#traySoil)"/>
  </g>
  <!-- seedlings sprouting in some cells -->
  <g stroke="#4A7C59" stroke-width="2.5" stroke-linecap="round">
    <path d="M97 155 q0 -14 0 -18"/>
    <ellipse cx="93" cy="135" rx="7" ry="4" fill="#4A7C59" stroke="none"/>
    <ellipse cx="101" cy="133" rx="7" ry="4" fill="#5a8f63" stroke="none"/>
  </g>
  <g stroke="#4A7C59" stroke-width="2" stroke-linecap="round">
    <path d="M221 155 q1 -8 -1 -12"/>
    <ellipse cx="219" cy="141" rx="5" ry="3" fill="#5a8f63" stroke="none"/>
  </g>
  <!-- one cell just a seed, not sprouted -->
  <circle cx="283" cy="172" r="2.5" fill="#D8C89A"/>

  <!-- sunny window light -->
  <g stroke="#E8A94A" stroke-width="2" opacity="0.4">
    <line x1="350" y1="20" x2="300" y2="90"/>
    <line x1="370" y1="40" x2="320" y2="100"/>
  </g>
  <circle cx="360" cy="35" r="16" fill="#E8A94A" opacity="0.7"/>

  <text x="200" y="235" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#5C4433" text-anchor="middle">Stage 2: Seeds started indoors</text>
</svg>
