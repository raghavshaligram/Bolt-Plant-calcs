<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A houseplant in bright light beside a window, next to three nursery pots of increasing size showing pot-sizing progression">
  <defs>
    <linearGradient id="ipBg" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#FBE7C4"/>
    </linearGradient>
    <linearGradient id="ipWindow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe6f2"/>
      <stop offset="100%" stop-color="#8fc4de"/>
    </linearGradient>
    <linearGradient id="ipLeaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6FA36F"/>
      <stop offset="100%" stop-color="#3D6647"/>
    </linearGradient>
    <linearGradient id="ipPot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C89A5E"/>
      <stop offset="100%" stop-color="#8B6535"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#ipBg)"/>

  <!-- window with light rays, left/mid -->
  <rect x="70" y="40" width="260" height="300" rx="8" fill="url(#ipWindow)" stroke="#3a2810" stroke-width="6"/>
  <line x1="200" y1="40" x2="200" y2="340" stroke="#3a2810" stroke-width="5"/>
  <line x1="70" y1="190" x2="330" y2="190" stroke="#3a2810" stroke-width="5"/>
  <g stroke="#E8A94A" stroke-width="4" opacity="0.6" stroke-linecap="round">
    <line x1="330" y1="80" x2="430" y2="60"/>
    <line x1="330" y1="120" x2="440" y2="105"/>
    <line x1="330" y1="160" x2="440" y2="150"/>
  </g>

  <!-- ground band -->
  <rect x="0" y="330" width="1200" height="70" fill="#3D6647" opacity="0.12"/>
  <line x1="0" y1="330" x2="1200" y2="330" stroke="#3a2810" stroke-width="3" opacity="0.4"/>

  <!-- houseplant beside window -->
  <g transform="translate(410,330)">
    <path d="M-35 0 L35 0 L26 -75 L-26 -75 Z" fill="url(#ipPot)" stroke="#3a2810" stroke-width="5"/>
    <path d="M0 -75 L0 -170" stroke="#3D6647" stroke-width="6" stroke-linecap="round"/>
    <path d="M0 -110 Q-55 -140 -70 -95 Q-30 -75 0 -110 Z" fill="url(#ipLeaf)" stroke="#2c4d33" stroke-width="3"/>
    <path d="M0 -150 Q55 -178 68 -132 Q28 -112 0 -150 Z" fill="url(#ipLeaf)" stroke="#2c4d33" stroke-width="3"/>
    <path d="M0 -130 Q-45 -168 -20 -195 Q15 -170 0 -130 Z" fill="url(#ipLeaf)" stroke="#2c4d33" stroke-width="3"/>
  </g>

  <!-- three nursery pots, increasing size, repotting progression -->
  <g transform="translate(680,370)">
    <path d="M0 0 L44 0 L38 -34 L6 -34 Z" fill="url(#ipPot)" stroke="#3a2810" stroke-width="4"/>
  </g>
  <g transform="translate(830,378)">
    <path d="M0 0 L64 0 L55 -50 L9 -50 Z" fill="url(#ipPot)" stroke="#3a2810" stroke-width="4.5"/>
  </g>
  <g transform="translate(1010,388)">
    <path d="M0 0 L92 0 L79 -74 L13 -74 Z" fill="url(#ipPot)" stroke="#3a2810" stroke-width="5"/>
  </g>
  <!-- progression arrows -->
  <path d="M740 350 L815 358" fill="none" stroke="#5C4433" stroke-width="3" marker-end="url(#ipArrow)"/>
  <path d="M910 355 L995 368" fill="none" stroke="#5C4433" stroke-width="3" marker-end="url(#ipArrow)"/>
  <defs>
    <marker id="ipArrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#5C4433"/>
    </marker>
  </defs>

  <ellipse cx="410" cy="332" rx="70" ry="10" fill="#2a1c0e" opacity="0.2"/>

  <text x="200" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5C4433" text-anchor="middle">Light</text>
  <text x="890" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5C4433" text-anchor="middle">Pot size, sized up over time</text>
</svg>
