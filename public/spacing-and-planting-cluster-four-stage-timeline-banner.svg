<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A four-stage garden planning timeline: frost calendar, seed tray, spacing grid, and harvest basket connected left to right">
  <defs>
    <linearGradient id="spBg" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#FBE7C4"/>
    </linearGradient>
    <linearGradient id="spSoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A5A3A"/>
      <stop offset="100%" stop-color="#4E3822"/>
    </linearGradient>
    <linearGradient id="spLeaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6FA36F"/>
      <stop offset="100%" stop-color="#3D6647"/>
    </linearGradient>
    <linearGradient id="spBasket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C89A5E"/>
      <stop offset="100%" stop-color="#8B6535"/>
    </linearGradient>
    <radialGradient id="spTomato" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#F2795A"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#spBg)"/>
  <rect x="0" y="330" width="1200" height="70" fill="#3D6647" opacity="0.1"/>

  <!-- connecting timeline -->
  <line x1="150" y1="200" x2="1050" y2="200" stroke="#E8A94A" stroke-width="5" stroke-dasharray="2 14" stroke-linecap="round"/>
  <g fill="#5C4433">
    <circle cx="150" cy="200" r="9"/>
    <circle cx="450" cy="200" r="9"/>
    <circle cx="750" cy="200" r="9"/>
    <circle cx="1050" cy="200" r="9"/>
  </g>

  <!-- Stage 1: frost calendar -->
  <g transform="translate(105,80)">
    <rect x="0" y="0" width="90" height="100" rx="8" fill="#F5F1E8" stroke="#3a2810" stroke-width="5"/>
    <rect x="0" y="0" width="90" height="24" rx="8" fill="#4A90B8" stroke="#3a2810" stroke-width="4"/>
    <g stroke="#3a2810" stroke-width="2" opacity="0.5">
      <line x1="12" y1="45" x2="78" y2="45"/>
      <line x1="12" y1="62" x2="78" y2="62"/>
      <line x1="12" y1="79" x2="78" y2="79"/>
    </g>
    <circle cx="45" cy="62" r="8" fill="#E8A94A" stroke="#3a2810" stroke-width="2.5"/>
  </g>

  <!-- Stage 2: seed tray -->
  <g transform="translate(390,110)">
    <rect x="0" y="0" width="120" height="60" rx="6" fill="url(#spSoil)" stroke="#3a2810" stroke-width="5"/>
    <g stroke="#3a2810" stroke-width="2" opacity="0.4">
      <line x1="30" y1="0" x2="30" y2="60"/>
      <line x1="60" y1="0" x2="60" y2="60"/>
      <line x1="90" y1="0" x2="90" y2="60"/>
    </g>
    <g fill="url(#spLeaf)" stroke="#2c4d33" stroke-width="2">
      <path d="M15 0 Q10 -20 20 -28 Q28 -18 15 0 Z"/>
      <path d="M45 0 Q40 -22 50 -30 Q58 -20 45 0 Z"/>
      <path d="M75 0 Q70 -18 80 -26 Q88 -16 75 0 Z"/>
      <path d="M105 0 Q100 -20 110 -28 Q118 -18 105 0 Z"/>
    </g>
  </g>

  <!-- Stage 3: spacing grid -->
  <g transform="translate(695,95)">
    <rect x="0" y="0" width="110" height="90" rx="6" fill="none" stroke="#3a2810" stroke-width="5"/>
    <g stroke="#3a2810" stroke-width="2" opacity="0.4">
      <line x1="37" y1="0" x2="37" y2="90"/>
      <line x1="74" y1="0" x2="74" y2="90"/>
      <line x1="0" y1="30" x2="110" y2="30"/>
      <line x1="0" y1="60" x2="110" y2="60"/>
    </g>
    <g fill="url(#spLeaf)">
      <circle cx="18" cy="15" r="9"/>
      <circle cx="55" cy="15" r="9"/>
      <circle cx="92" cy="15" r="9"/>
      <circle cx="18" cy="45" r="9"/>
      <circle cx="55" cy="45" r="9"/>
      <circle cx="92" cy="45" r="9"/>
      <circle cx="18" cy="75" r="9"/>
      <circle cx="55" cy="75" r="9"/>
      <circle cx="92" cy="75" r="9"/>
    </g>
  </g>

  <!-- Stage 4: harvest basket -->
  <g transform="translate(1000,90)">
    <path d="M0 40 L100 40 L88 100 L12 100 Z" fill="url(#spBasket)" stroke="#3a2810" stroke-width="5"/>
    <path d="M20 40 Q50 -10 80 40 Z" fill="none" stroke="#3a2810" stroke-width="5"/>
    <g stroke="#8B6535" stroke-width="2" opacity="0.6">
      <line x1="10" y1="55" x2="90" y2="55"/>
      <line x1="8" y1="75" x2="92" y2="75"/>
    </g>
    <circle cx="35" cy="30" r="17" fill="url(#spTomato)" stroke="#3a2810" stroke-width="3"/>
    <circle cx="65" cy="24" r="15" fill="url(#spTomato)" stroke="#3a2810" stroke-width="3"/>
    <path d="M85 32 Q100 10 108 30 Q95 22 85 32 Z" fill="url(#spLeaf)" stroke="#2c4d33" stroke-width="2"/>
  </g>

  <ellipse cx="150" cy="185" rx="55" ry="8" fill="#2a1c0e" opacity="0.15"/>
  <ellipse cx="450" cy="175" rx="65" ry="8" fill="#2a1c0e" opacity="0.15"/>
  <ellipse cx="750" cy="190" rx="60" ry="8" fill="#2a1c0e" opacity="0.15"/>
  <ellipse cx="1050" cy="195" rx="60" ry="8" fill="#2a1c0e" opacity="0.15"/>

  <text x="150" y="280" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#5C4433" text-anchor="middle">Frost dates</text>
  <text x="450" y="280" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#5C4433" text-anchor="middle">Start seeds</text>
  <text x="750" y="280" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#5C4433" text-anchor="middle">Space it out</text>
  <text x="1050" y="280" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#5C4433" text-anchor="middle">Harvest</text>
</svg>
