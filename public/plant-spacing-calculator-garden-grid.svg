<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#f6f9f0"/>

  <!-- Bed border -->
  <rect x="20" y="20" width="360" height="260" rx="6" fill="#e8f0df" stroke="#7a9a5b" stroke-width="2"/>

  <!-- Soil fill -->
  <rect x="28" y="28" width="344" height="244" rx="4" fill="#c8a870" opacity="0.35"/>

  <!-- Grid lines (column guides) -->
  <line x1="92" y1="28" x2="92" y2="272" stroke="#7a9a5b" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="164" y1="28" x2="164" y2="272" stroke="#7a9a5b" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="236" y1="28" x2="236" y2="272" stroke="#7a9a5b" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="308" y1="28" x2="308" y2="272" stroke="#7a9a5b" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Grid lines (row guides) -->
  <line x1="28" y1="94" x2="372" y2="94" stroke="#7a9a5b" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="28" y1="160" x2="372" y2="160" stroke="#7a9a5b" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="28" y1="226" x2="372" y2="226" stroke="#7a9a5b" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Plant group helper: circle + leaf icon at each grid node -->
  <!-- Row 1 -->
  <g transform="translate(56,60)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(128,60)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(200,60)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(272,60)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(344,60)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>

  <!-- Row 2 -->
  <g transform="translate(56,126)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(128,126)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(200,126)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(272,126)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(344,126)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>

  <!-- Row 3 -->
  <g transform="translate(56,192)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(128,192)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(200,192)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(272,192)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(344,192)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>

  <!-- Row 4 -->
  <g transform="translate(56,255)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(128,255)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(200,255)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(272,255)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>
  <g transform="translate(344,255)"><circle r="14" fill="#5a8a35" opacity="0.85"/><text x="0" y="5" text-anchor="middle" font-size="14" fill="white">🌿</text></g>

  <!-- In-row spacing arrow between col 1 and col 2, row 1 -->
  <line x1="72" y1="60" x2="112" y2="60" stroke="#b05a20" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="92" y="53" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#b05a20" font-weight="600">in-row</text>

  <!-- Between-row spacing arrow between row 1 and row 2, col 1 -->
  <line x1="56" y1="76" x2="56" y2="110" stroke="#1a6b9e" stroke-width="1.5" marker-start="url(#arr2)" marker-end="url(#arr2)"/>
  <text x="56" y="97" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1a6b9e" font-weight="600" transform="rotate(-90 56 97)">row spacing</text>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 Z" fill="#b05a20"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 Z" fill="#1a6b9e"/>
    </marker>
  </defs>
</svg>
