<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="A compost bin next to a raised garden bed receiving a layer of finished compost">
  <!-- Background -->
  <rect width="800" height="500" fill="#F5F1E8"/>
  <rect x="0" y="0" width="800" height="190" fill="#EDE7D6"/>
  <path d="M0 190 Q200 155 400 175 T800 180 V210 H0 Z" fill="#D4DCC4" opacity="0.5"/>
  <circle cx="700" cy="80" r="30" fill="#F0D878" opacity="0.7"/>
  <circle cx="700" cy="80" r="22" fill="#F0C850" opacity="0.6"/>

  <!-- Ground -->
  <rect x="0" y="420" width="800" height="80" fill="#C8D9A8"/>

  <!-- Compost bin (slatted wood, left) -->
  <g transform="translate(90,260)">
    <rect x="0" y="0" width="180" height="150" rx="6" fill="#8B6A44"/>
    <g stroke="#6B4E30" stroke-width="3">
      <line x1="12" y1="10" x2="12" y2="140"/>
      <line x1="40" y1="10" x2="40" y2="140"/>
      <line x1="68" y1="10" x2="68" y2="140"/>
      <line x1="96" y1="10" x2="96" y2="140"/>
      <line x1="124" y1="10" x2="124" y2="140"/>
      <line x1="152" y1="10" x2="152" y2="140"/>
    </g>
    <!-- compost material peeking over top -->
    <ellipse cx="90" cy="6" rx="88" ry="14" fill="#4A3A28"/>
    <g fill="#3A2E20">
      <circle cx="50" cy="2" r="5"/>
      <circle cx="90" cy="-2" r="6"/>
      <circle cx="130" cy="3" r="5"/>
    </g>
  </g>

  <!-- Wheelbarrow moving compost to the bed -->
  <g transform="translate(320,340)">
    <circle cx="20" cy="60" r="16" fill="#3A4A2A"/>
    <path d="M0 20 L110 20 L100 55 L10 55 Z" fill="#B5652F"/>
    <ellipse cx="55" cy="18" rx="52" ry="8" fill="#4A3A28"/>
    <line x1="100" y1="30" x2="140" y2="40" stroke="#8B6A44" stroke-width="6" stroke-linecap="round"/>
    <line x1="100" y1="45" x2="140" y2="55" stroke="#8B6A44" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Raised bed (right) -->
  <g transform="translate(520,290)">
    <path d="M0 0 L200 0 L200 100 L0 100 Z" fill="#7A5C3E"/>
    <path d="M0 0 L200 0 L200 14 L0 14 Z" fill="#634A30"/>
    <!-- soil surface -->
    <rect x="8" y="16" width="184" height="20" fill="#3A2E20"/>
    <!-- compost top-dressing layer -->
    <rect x="8" y="8" width="184" height="10" fill="#4A3A28" opacity="0.9"/>
    <!-- small seedlings -->
    <g fill="#6B8E4E">
      <ellipse cx="40" cy="6" rx="10" ry="6"/>
      <ellipse cx="100" cy="4" rx="12" ry="7"/>
      <ellipse cx="160" cy="6" rx="10" ry="6"/>
    </g>
  </g>

  <g>
    <rect x="300" y="30" width="200" height="30" rx="6" fill="#3A4A2A" opacity="0.9"/>
    <text x="400" y="50" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#F5F1E8" text-anchor="middle">Finished compost, ready to use</text>
  </g>
</svg>
