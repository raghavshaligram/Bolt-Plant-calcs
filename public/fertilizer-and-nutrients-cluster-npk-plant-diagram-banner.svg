<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A plant cross-section showing nitrogen feeding leafy growth, phosphorus feeding roots and flowers, and potassium supporting overall vigor, beside a fertilizer bag with its N-P-K numbers">
  <defs>
    <linearGradient id="fnBg" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#FBE7C4"/>
    </linearGradient>
    <linearGradient id="fnSoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A5A3A"/>
      <stop offset="100%" stop-color="#4E3822"/>
    </linearGradient>
    <linearGradient id="fnLeaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6FA36F"/>
      <stop offset="100%" stop-color="#3D6647"/>
    </linearGradient>
    <linearGradient id="fnBag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8A94A"/>
      <stop offset="100%" stop-color="#C88936"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#fnBg)"/>
  <rect x="0" y="330" width="1200" height="70" fill="url(#fnSoil)"/>
  <line x1="0" y1="330" x2="1200" y2="330" stroke="#3a2810" stroke-width="4"/>

  <!-- plant cross-section, left/center -->
  <path d="M340 330 L340 190" stroke="#3D6647" stroke-width="7" stroke-linecap="round"/>
  <!-- N: leafy growth -->
  <path d="M340 230 Q270 210 250 260 Q305 275 340 230 Z" fill="url(#fnLeaf)" stroke="#2c4d33" stroke-width="3"/>
  <path d="M340 200 Q410 180 430 230 Q375 245 340 200 Z" fill="url(#fnLeaf)" stroke="#2c4d33" stroke-width="3"/>
  <circle cx="270" cy="150" r="26" fill="#E8A94A" opacity="0.3"/>
  <text x="270" y="120" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#3D6647" text-anchor="middle">N</text>
  <text x="270" y="105" font-family="Arial, sans-serif" font-size="12" fill="#5C4433" text-anchor="middle">leafy growth</text>

  <!-- K flower top -->
  <circle cx="340" cy="185" r="20" fill="#E8734A" stroke="#3a2810" stroke-width="3"/>
  <circle cx="340" cy="185" r="9" fill="#E8A94A"/>
  <text x="410" y="150" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#C0392B" text-anchor="middle">K</text>
  <text x="410" y="135" font-family="Arial, sans-serif" font-size="12" fill="#5C4433" text-anchor="middle">overall vigor</text>

  <!-- P roots below soil line -->
  <path d="M340 330 Q310 355 290 385 M340 330 Q370 358 385 390 M340 330 Q340 365 340 395" stroke="#C89A5E" stroke-width="5" stroke-linecap="round" fill="none"/>
  <text x="230" y="380" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#F5F1E8" text-anchor="middle">P</text>
  <text x="230" y="360" font-family="Arial, sans-serif" font-size="12" fill="#F5F1E8" text-anchor="middle">roots &amp; flowers</text>

  <!-- fertilizer bag, right -->
  <g transform="translate(830,110)">
    <path d="M0 0 L200 0 L215 260 L-15 260 Z" fill="url(#fnBag)" stroke="#3a2810" stroke-width="6" stroke-linejoin="round"/>
    <rect x="10" y="20" width="180" height="46" rx="6" fill="#F5F1E8" stroke="#3a2810" stroke-width="3"/>
    <text x="100" y="52" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#5C4433" text-anchor="middle">FERTILIZER</text>
    <g font-family="Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle">
      <text x="45" y="140" fill="#3D6647">10</text>
      <text x="100" y="140" fill="#C0392B">10</text>
      <text x="155" y="140" fill="#C88936">10</text>
    </g>
    <g font-family="Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#5C4433">
      <text x="45" y="165">N</text>
      <text x="100" y="165">P</text>
      <text x="155" y="165">K</text>
    </g>
    <line x1="10" y1="180" x2="190" y2="180" stroke="#3a2810" stroke-width="2" opacity="0.4"/>
    <text x="100" y="220" font-family="Arial, sans-serif" font-size="13" fill="#5C4433" text-anchor="middle">balanced NPK ratio</text>
  </g>

  <ellipse cx="340" cy="332" rx="60" ry="10" fill="#2a1c0e" opacity="0.15"/>
  <ellipse cx="930" cy="375" rx="120" ry="12" fill="#2a1c0e" opacity="0.2"/>
</svg>
