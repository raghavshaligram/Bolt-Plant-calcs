<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="A mature tree with a properly mulched ring around its base showing the trunk gap, alongside an inset cross-section of its growth rings">
  <rect width="800" height="500" fill="#EEF3E7"/>
  <rect x="0" y="420" width="800" height="80" fill="#DCE7CF"/>

  <!-- Tree -->
  <g>
    <!-- canopy -->
    <ellipse cx="260" cy="150" rx="150" ry="105" fill="#3D6647"/>
    <ellipse cx="200" cy="120" rx="90" ry="65" fill="#4A7C59"/>
    <ellipse cx="330" cy="130" rx="100" ry="70" fill="#4A7C59"/>
    <!-- trunk -->
    <path d="M240 240 L245 400 L275 400 L280 240 Z" fill="#6B4F35"/>
  </g>

  <!-- Mulch ring (flat, with trunk gap) -->
  <g>
    <ellipse cx="260" cy="410" rx="140" ry="34" fill="#8B6535"/>
    <ellipse cx="260" cy="410" rx="34" ry="10" fill="#DCE7CF"/>
  </g>
  <!-- gap callout -->
  <line x1="260" y1="400" x2="330" y2="370" stroke="#5C4433" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="336" y="373" font-family="Arial, sans-serif" font-size="13" fill="#5C4433">3&#8211;6 in gap</text>
  <line x1="150" y1="415" x2="90" y2="440" stroke="#5C4433" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="20" y="455" font-family="Arial, sans-serif" font-size="13" fill="#5C4433">2&#8211;4 in deep</text>

  <!-- Inset: trunk cross-section with growth rings -->
  <g transform="translate(620,180)">
    <circle cx="0" cy="0" r="120" fill="#F5F1E8" stroke="#5C4433" stroke-width="6"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#B8975C" stroke-width="4"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#8B6535" stroke-width="4"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#B8975C" stroke-width="4"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#8B6535" stroke-width="4"/>
    <circle cx="0" cy="0" r="20" fill="#6B4F35"/>
    <text x="0" y="150" font-family="'Playfair Display', Georgia, serif" font-size="18" font-weight="700" fill="#5C4433" text-anchor="middle">Growth Rings</text>
  </g>
</svg>
