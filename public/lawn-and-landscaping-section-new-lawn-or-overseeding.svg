<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bggl1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <linearGradient id="bareSoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A5A3A"/>
      <stop offset="100%" stop-color="#4E3822"/>
    </linearGradient>
    <linearGradient id="thinGrass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FB87A"/>
      <stop offset="100%" stop-color="#6B9457"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bggl1)"/>
  <line x1="200" y1="60" x2="200" y2="215" stroke="#c9b896" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Left: bare soil being seeded -->
  <rect x="20" y="170" width="160" height="45" fill="url(#bareSoil)"/>
  <g opacity="0.6">
    <circle cx="50" cy="185" r="1.8" fill="#2a1c0e"/>
    <circle cx="90" cy="195" r="1.5" fill="#2a1c0e"/>
    <circle cx="130" cy="180" r="1.6" fill="#2a1c0e"/>
    <circle cx="160" cy="200" r="1.4" fill="#2a1c0e"/>
  </g>
  <!-- seed scatter -->
  <g fill="#D8C89A">
    <circle cx="60" cy="160" r="1.6"/>
    <circle cx="80" cy="150" r="1.4"/>
    <circle cx="100" cy="163" r="1.5"/>
    <circle cx="120" cy="148" r="1.3"/>
    <circle cx="140" cy="158" r="1.6"/>
    <circle cx="70" cy="145" r="1.2"/>
    <circle cx="155" cy="150" r="1.4"/>
  </g>
  <!-- spreader hand tool -->
  <g transform="translate(95,110)">
    <rect x="-4" y="0" width="8" height="35" rx="3" fill="#7a5a34"/>
    <ellipse cx="0" cy="42" rx="20" ry="9" fill="#5c6470"/>
    <ellipse cx="0" cy="42" rx="20" ry="9" fill="none" stroke="#3a3f47" stroke-width="1"/>
  </g>
  <text x="100" y="235" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#5C4433" text-anchor="middle">New lawn: bare soil</text>

  <!-- Right: existing thin turf being overseeded -->
  <rect x="220" y="170" width="160" height="45" fill="url(#bareSoil)"/>
  <g opacity="0.9">
    <path d="M235 172 q3 -14 0 -22" stroke="#3D6647" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M250 172 q-2 -12 2 -20" stroke="#4A7C59" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M270 172 q3 -10 -1 -18" stroke="#3D6647" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M300 172 q-3 -14 1 -22" stroke="#4A7C59" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M330 172 q2 -10 -2 -18" stroke="#3D6647" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M355 172 q-2 -12 2 -20" stroke="#4A7C59" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M365 172 q3 -8 0 -14" stroke="#3D6647" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- new seed scattered among existing turf -->
  <g fill="#D8C89A">
    <circle cx="240" cy="155" r="1.3"/>
    <circle cx="285" cy="148" r="1.4"/>
    <circle cx="315" cy="156" r="1.2"/>
    <circle cx="340" cy="150" r="1.3"/>
  </g>
  <text x="300" y="235" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#5C4433" text-anchor="middle">Overseeding: existing turf</text>
</svg>
