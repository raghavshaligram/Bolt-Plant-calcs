<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="A rain barrel collecting water from a roof gutter, feeding a drip irrigation line running to plants along a garden row">
  <!-- Background -->
  <rect width="800" height="500" fill="#EEF3E7"/>
  <rect x="0" y="0" width="800" height="150" fill="#E4EDDA"/>
  <rect x="0" y="400" width="800" height="100" fill="#DCE7CF"/>

  <!-- Rain clouds -->
  <g fill="#B9C9CF" opacity="0.8">
    <ellipse cx="150" cy="60" rx="60" ry="26"/>
    <ellipse cx="195" cy="48" rx="45" ry="22"/>
  </g>
  <g stroke="#8FAAB4" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <line x1="120" y1="85" x2="112" y2="118"/>
    <line x1="150" y1="88" x2="142" y2="122"/>
    <line x1="180" y1="85" x2="172" y2="118"/>
  </g>

  <!-- Roof + gutter -->
  <g>
    <path d="M40 150 L140 90 L240 150 Z" fill="#8B6535"/>
    <rect x="55" y="150" width="170" height="10" fill="#6B4F35"/>
  </g>

  <!-- Rain barrel -->
  <g transform="translate(140,160)">
    <rect x="-30" y="0" width="60" height="110" rx="8" fill="#3D6647"/>
    <rect x="-30" y="0" width="60" height="110" rx="8" fill="none" stroke="#2E4E36" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="30" ry="9" fill="#4A7C59"/>
    <rect x="-8" y="95" width="16" height="12" rx="3" fill="#8B6535"/>
  </g>
  <!-- downspout connecting roof to barrel -->
  <rect x="132" y="160" width="14" height="20" fill="#6B4F35"/>

  <!-- Pipe/hose running from barrel to drip line (gravity feed) -->
  <path d="M170 250 C 260 250, 260 300, 340 300" stroke="#5C4433" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Drip line along a garden row -->
  <line x1="340" y1="300" x2="740" y2="300" stroke="#5C4433" stroke-width="6" stroke-linecap="round"/>

  <!-- Plants along the row with drip emitters -->
  <g>
    <!-- plant 1 -->
    <g transform="translate(400,300)">
      <path d="M0 0 C -20 -10 -25 -35 -10 -50 C -5 -35 0 -25 0 -20 C 5 -30 15 -40 8 -55 C 25 -35 20 -10 0 0 Z" fill="#4A7C59"/>
      <circle cx="0" cy="4" r="4" fill="#E8A94A"/>
    </g>
    <!-- plant 2 -->
    <g transform="translate(500,300)">
      <path d="M0 0 C -18 -9 -22 -32 -9 -46 C -4 -32 0 -23 0 -18 C 4 -27 13 -37 7 -50 C 22 -32 18 -9 0 0 Z" fill="#4A7C59"/>
      <circle cx="0" cy="4" r="4" fill="#E8A94A"/>
    </g>
    <!-- plant 3 -->
    <g transform="translate(600,300)">
      <path d="M0 0 C -20 -10 -25 -35 -10 -50 C -5 -35 0 -25 0 -20 C 5 -30 15 -40 8 -55 C 25 -35 20 -10 0 0 Z" fill="#3D6647"/>
      <circle cx="0" cy="4" r="4" fill="#E8A94A"/>
    </g>
    <!-- plant 4 -->
    <g transform="translate(700,300)">
      <path d="M0 0 C -18 -9 -22 -32 -9 -46 C -4 -32 0 -23 0 -18 C 4 -27 13 -37 7 -50 C 22 -32 18 -9 0 0 Z" fill="#4A7C59"/>
      <circle cx="0" cy="4" r="4" fill="#E8A94A"/>
    </g>
  </g>

  <!-- soil/ground line under plants -->
  <rect x="340" y="304" width="400" height="96" fill="#B8975C" opacity="0.4"/>

  <!-- water droplets falling from emitters -->
  <g fill="#4A90B8" opacity="0.7">
    <circle cx="400" cy="312" r="2.5"/>
    <circle cx="500" cy="312" r="2.5"/>
    <circle cx="600" cy="312" r="2.5"/>
    <circle cx="700" cy="312" r="2.5"/>
  </g>
</svg>
