<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgip1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <linearGradient id="windowGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#f0e2b8"/>
    </linearGradient>
    <linearGradient id="potG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8975C"/>
      <stop offset="100%" stop-color="#8B6535"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgip1)"/>

  <!-- window -->
  <rect x="270" y="20" width="110" height="160" rx="4" fill="url(#windowGlow)" stroke="#c9b896" stroke-width="3"/>
  <line x1="325" y1="20" x2="325" y2="180" stroke="#c9b896" stroke-width="3"/>
  <line x1="270" y1="100" x2="380" y2="100" stroke="#c9b896" stroke-width="3"/>
  <!-- light rays -->
  <g stroke="#E8A94A" stroke-width="2" opacity="0.5">
    <line x1="270" y1="60" x2="150" y2="90"/>
    <line x1="270" y1="90" x2="130" y2="130"/>
    <line x1="270" y1="120" x2="150" y2="160"/>
  </g>

  <!-- 3 plants at varying distance = light levels -->
  <!-- high light: close to window -->
  <ellipse cx="245" cy="205" rx="20" ry="6" fill="#000" opacity="0.15"/>
  <path d="M232 205 L238 175 L252 175 L258 205 Z" fill="url(#potG)"/>
  <ellipse cx="235" cy="160" rx="16" ry="9" fill="#3D6647" transform="rotate(-15 235 160)"/>
  <ellipse cx="255" cy="155" rx="16" ry="9" fill="#4A7C59" transform="rotate(15 255 155)"/>
  <text x="245" y="222" font-family="Arial, sans-serif" font-size="9" fill="#5C4433" text-anchor="middle">High light</text>

  <!-- medium: mid distance -->
  <ellipse cx="150" cy="210" rx="20" ry="6" fill="#000" opacity="0.15"/>
  <path d="M137 210 L143 182 L157 182 L163 210 Z" fill="url(#potG)"/>
  <ellipse cx="140" cy="168" rx="15" ry="8" fill="#4A7C59" transform="rotate(-15 140 168)"/>
  <ellipse cx="160" cy="164" rx="15" ry="8" fill="#5a8f63" transform="rotate(15 160 164)"/>
  <text x="150" y="227" font-family="Arial, sans-serif" font-size="9" fill="#5C4433" text-anchor="middle">Medium light</text>

  <!-- low: far from window -->
  <ellipse cx="55" cy="215" rx="18" ry="5" fill="#000" opacity="0.15"/>
  <path d="M44 215 L49 190 L61 190 L66 215 Z" fill="url(#potG)"/>
  <ellipse cx="48" cy="178" rx="13" ry="7" fill="#5a8f63" transform="rotate(-15 48 178)"/>
  <ellipse cx="63" cy="175" rx="13" ry="7" fill="#6fa36f" transform="rotate(15 63 175)"/>
  <text x="55" y="232" font-family="Arial, sans-serif" font-size="9" fill="#5C4433" text-anchor="middle">Low light</text>
</svg>
