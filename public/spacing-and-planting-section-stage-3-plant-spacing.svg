<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgs3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <linearGradient id="bedSoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B4C30"/>
      <stop offset="100%" stop-color="#3E2C18"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgs3)"/>

  <!-- bird's eye bed with grid spacing -->
  <rect x="50" y="50" width="300" height="150" rx="6" fill="url(#bedSoil)"/>
  <g stroke="#8B6535" stroke-width="1" opacity="0.4">
    <line x1="115" y1="50" x2="115" y2="200"/>
    <line x1="180" y1="50" x2="180" y2="200"/>
    <line x1="245" y1="50" x2="245" y2="200"/>
    <line x1="310" y1="50" x2="310" y2="200"/>
    <line x1="50" y1="100" x2="350" y2="100"/>
    <line x1="50" y1="150" x2="350" y2="150"/>
  </g>

  <!-- plants at grid intersections -->
  <g fill="#4A7C59">
    <circle cx="82" cy="75" r="12"/>
    <circle cx="147" cy="75" r="12"/>
    <circle cx="212" cy="75" r="12"/>
    <circle cx="278" cy="75" r="12"/>
    <circle cx="82" cy="125" r="12"/>
    <circle cx="147" cy="125" r="12"/>
    <circle cx="212" cy="125" r="12"/>
    <circle cx="278" cy="125" r="12"/>
    <circle cx="82" cy="175" r="12"/>
    <circle cx="147" cy="175" r="12"/>
    <circle cx="212" cy="175" r="12"/>
    <circle cx="278" cy="175" r="12"/>
  </g>
  <g fill="#5a8f63" opacity="0.6">
    <circle cx="82" cy="75" r="6"/>
    <circle cx="147" cy="75" r="6"/>
    <circle cx="212" cy="75" r="6"/>
    <circle cx="278" cy="75" r="6"/>
    <circle cx="82" cy="125" r="6"/>
    <circle cx="147" cy="125" r="6"/>
    <circle cx="212" cy="125" r="6"/>
    <circle cx="278" cy="125" r="6"/>
    <circle cx="82" cy="175" r="6"/>
    <circle cx="147" cy="175" r="6"/>
    <circle cx="212" cy="175" r="6"/>
    <circle cx="278" cy="175" r="6"/>
  </g>

  <!-- spacing measurement -->
  <line x1="82" y1="215" x2="147" y2="215" stroke="#5C4433" stroke-width="1.5"/>
  <line x1="82" y1="210" x2="82" y2="220" stroke="#5C4433" stroke-width="1.5"/>
  <line x1="147" y1="210" x2="147" y2="220" stroke="#5C4433" stroke-width="1.5"/>
  <text x="114" y="230" font-family="Arial, sans-serif" font-size="10" fill="#5C4433" text-anchor="middle">spacing</text>

  <text x="200" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#5C4433" text-anchor="middle">Stage 3: Transplants spaced in the bed</text>
</svg>
