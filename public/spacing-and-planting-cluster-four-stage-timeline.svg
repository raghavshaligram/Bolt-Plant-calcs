<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="A four-stage garden planning timeline: frost calendar, seed tray, spacing grid, and harvest basket connected left to right">
  <rect width="800" height="500" fill="#EEF3E7"/>

  <!-- Connecting timeline path -->
  <line x1="100" y1="250" x2="700" y2="250" stroke="#8A9A6B" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
  <g fill="#5C4433">
    <circle cx="100" cy="250" r="7"/>
    <circle cx="300" cy="250" r="7"/>
    <circle cx="500" cy="250" r="7"/>
    <circle cx="700" cy="250" r="7"/>
  </g>

  <!-- Stage 1: Frost calendar -->
  <g transform="translate(100,150)">
    <rect x="-45" y="-40" width="90" height="80" rx="8" fill="#F5F1E8" stroke="#5C4433" stroke-width="4"/>
    <rect x="-45" y="-40" width="90" height="22" fill="#4A7C59"/>
    <line x1="-25" y1="-48" x2="-25" y2="-32" stroke="#3D6647" stroke-width="4" stroke-linecap="round"/>
    <line x1="25" y1="-48" x2="25" y2="-32" stroke="#3D6647" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="20" font-family="'Playfair Display', Georgia, serif" font-size="30" fill="#4A90B8" text-anchor="middle" font-weight="700">*</text>
    <circle cx="0" cy="6" r="5" fill="#4A90B8"/>
  </g>
  <text x="100" y="220" font-family="Arial, sans-serif" font-size="13" fill="#5C4433" text-anchor="middle" font-weight="700">Frost Date</text>

  <!-- Stage 2: Seed tray -->
  <g transform="translate(300,150)">
    <rect x="-45" y="-20" width="90" height="45" rx="6" fill="#8B6535"/>
    <g stroke="#6B4F35" stroke-width="2">
      <line x1="-15" y1="-20" x2="-15" y2="25"/>
      <line x1="15" y1="-20" x2="15" y2="25"/>
      <line x1="-45" y1="2" x2="45" y2="2"/>
    </g>
    <g fill="#4A7C59">
      <path d="M-30 -20 C -34 -32 -26 -38 -30 -46 C -20 -40 -20 -28 -30 -20 Z"/>
      <path d="M0 -20 C -4 -32 4 -38 0 -46 C 10 -40 10 -28 0 -20 Z"/>
      <path d="M30 -20 C 26 -32 34 -38 30 -46 C 40 -40 40 -28 30 -20 Z"/>
    </g>
  </g>
  <text x="300" y="220" font-family="Arial, sans-serif" font-size="13" fill="#5C4433" text-anchor="middle" font-weight="700">Seed Starting</text>

  <!-- Stage 3: Spacing grid -->
  <g transform="translate(500,150)">
    <rect x="-45" y="-40" width="90" height="80" rx="6" fill="#F5F1E8" stroke="#5C4433" stroke-width="3"/>
    <g stroke="#8A9A6B" stroke-width="2">
      <line x1="-15" y1="-40" x2="-15" y2="40"/>
      <line x1="15" y1="-40" x2="15" y2="40"/>
      <line x1="-45" y1="-13" x2="45" y2="-13"/>
      <line x1="-45" y1="13" x2="45" y2="13"/>
    </g>
    <g fill="#4A7C59">
      <circle cx="-30" cy="-27" r="6"/>
      <circle cx="0" cy="-27" r="6"/>
      <circle cx="30" cy="-27" r="6"/>
      <circle cx="-30" cy="0" r="6"/>
      <circle cx="0" cy="0" r="6"/>
      <circle cx="30" cy="0" r="6"/>
      <circle cx="-30" cy="27" r="6"/>
      <circle cx="0" cy="27" r="6"/>
      <circle cx="30" cy="27" r="6"/>
    </g>
  </g>
  <text x="500" y="220" font-family="Arial, sans-serif" font-size="13" fill="#5C4433" text-anchor="middle" font-weight="700">Plant Spacing</text>

  <!-- Stage 4: Harvest basket -->
  <g transform="translate(700,150)">
    <path d="M-40 0 L-32 40 L32 40 L40 0 Z" fill="#B8975C"/>
    <path d="M-40 0 L40 0 L36 -10 L-36 -10 Z" fill="#8B6535"/>
    <g stroke="#6B4F35" stroke-width="2" opacity="0.6">
      <line x1="-30" y1="5" x2="-26" y2="35"/>
      <line x1="0" y1="5" x2="0" y2="35"/>
      <line x1="30" y1="5" x2="26" y2="35"/>
    </g>
    <g fill="#4A7C59">
      <circle cx="-15" cy="-18" r="10"/>
      <circle cx="10" cy="-22" r="12"/>
      <circle cx="-2" cy="-14" r="9"/>
    </g>
    <g fill="#E8A94A">
      <circle cx="-15" cy="-18" r="4" opacity="0.7"/>
      <circle cx="10" cy="-22" r="5" opacity="0.7"/>
    </g>
  </g>
  <text x="700" y="220" font-family="Arial, sans-serif" font-size="13" fill="#5C4433" text-anchor="middle" font-weight="700">Vegetable Yield</text>

  <!-- Stage numbers -->
  <g font-family="'Playfair Display', Georgia, serif" font-size="16" font-weight="700" fill="#3D6647" text-anchor="middle">
    <text x="100" y="300">Stage 1</text>
    <text x="300" y="300">Stage 2</text>
    <text x="500" y="300">Stage 3</text>
    <text x="700" y="300">Stage 4</text>
  </g>
</svg>
