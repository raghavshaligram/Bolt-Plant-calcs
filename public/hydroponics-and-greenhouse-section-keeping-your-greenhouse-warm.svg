<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgh1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <linearGradient id="glazeG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8dce8"/>
      <stop offset="100%" stop-color="#8fc4de"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgh1)"/>
  <rect x="0" y="205" width="400" height="15" fill="#4E3822" opacity="0.4"/>

  <!-- hoop house -->
  <path d="M40 205 L40 130 Q40 55 200 55 Q360 55 360 130 L360 205 Z" fill="url(#glazeG)" opacity="0.7" stroke="#4A90B8" stroke-width="3"/>
  <path d="M100 205 L100 100 Q100 80 130 75" fill="none" stroke="#4A90B8" stroke-width="1.5" opacity="0.5"/>
  <path d="M200 205 L200 62" fill="none" stroke="#4A90B8" stroke-width="1.5" opacity="0.5"/>
  <path d="M300 205 L300 100 Q300 80 270 75" fill="none" stroke="#4A90B8" stroke-width="1.5" opacity="0.5"/>

  <!-- warm glow inside from heater -->
  <circle cx="200" cy="160" r="55" fill="#E8A94A" opacity="0.35"/>
  <g transform="translate(185,175)">
    <rect x="0" y="0" width="30" height="24" rx="3" fill="#8a95a0"/>
    <circle cx="15" cy="-6" r="8" fill="#E8734A"/>
    <path d="M8 -14 Q15 -22 22 -14" stroke="#E8734A" stroke-width="2" fill="none"/>
  </g>

  <!-- snowy cold outside -->
  <g fill="#4A90B8" opacity="0.5">
    <circle cx="20" cy="70" r="3"/>
    <circle cx="45" cy="45" r="2.5"/>
    <circle cx="15" cy="100" r="2"/>
    <circle cx="380" cy="65" r="3"/>
    <circle cx="360" cy="40" r="2.5"/>
    <circle cx="385" cy="95" r="2"/>
  </g>

  <text x="200" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#5C4433" text-anchor="middle">A heated greenhouse against cold air outside</text>
</svg>
