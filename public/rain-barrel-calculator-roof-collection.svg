<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Rain flowing off a roof through a gutter into a rain barrel with a spigot near the base">
  <!-- Background -->
  <rect width="800" height="500" fill="#E4EDF0"/>
  <rect x="0" y="0" width="800" height="230" fill="#DCE7EC"/>

  <!-- Rain clouds -->
  <g fill="#B9C9CF">
    <ellipse cx="180" cy="70" rx="70" ry="30"/>
    <ellipse cx="230" cy="55" rx="55" ry="26"/>
    <ellipse cx="130" cy="60" rx="50" ry="24"/>
  </g>
  <g fill="#CBD8DC">
    <ellipse cx="560" cy="60" rx="65" ry="26"/>
    <ellipse cx="610" cy="48" rx="48" ry="22"/>
  </g>

  <!-- Falling rain -->
  <g stroke="#8FAAB4" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="120" y1="100" x2="110" y2="140"/>
    <line x1="150" y1="105" x2="140" y2="150"/>
    <line x1="180" y1="100" x2="170" y2="145"/>
    <line x1="210" y1="105" x2="200" y2="150"/>
    <line x1="240" y1="100" x2="230" y2="140"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="410" width="800" height="90" fill="#C8D9A8"/>

  <!-- House roof + wall (simplified, angled view) -->
  <g>
    <!-- Roof -->
    <path d="M150 260 L400 130 L650 260 Z" fill="#8B6535"/>
    <path d="M150 260 L400 130 L650 260 L650 275 L400 145 L150 275 Z" fill="#7A5C3E"/>
    <!-- Wall -->
    <rect x="200" y="260" width="400" height="150" fill="#E8DFC8"/>
    <!-- Window -->
    <rect x="380" y="300" width="40" height="50" rx="3" fill="#CFE7EE" stroke="#8B6535" stroke-width="3"/>
  </g>

  <!-- Gutter along roof edge -->
  <rect x="150" y="272" width="150" height="10" rx="3" fill="#5A6B72"/>

  <!-- Downspout -->
  <rect x="190" y="280" width="14" height="110" rx="3" fill="#5A6B72"/>

  <!-- Rain barrel -->
  <g transform="translate(150, 360)">
    <!-- Barrel body -->
    <rect x="0" y="0" width="90" height="110" rx="12" fill="#3D6647"/>
    <rect x="0" y="0" width="90" height="16" rx="8" fill="#4A7C59"/>
    <!-- Barrel bands -->
    <rect x="0" y="35" width="90" height="6" fill="#2E4F38" opacity="0.6"/>
    <rect x="0" y="80" width="90" height="6" fill="#2E4F38" opacity="0.6"/>
    <!-- Lid -->
    <ellipse cx="45" cy="0" rx="45" ry="8" fill="#2E4F38"/>
    <!-- Spigot -->
    <rect x="80" y="85" width="18" height="8" rx="3" fill="#8B6535"/>
    <circle cx="100" cy="89" r="5" fill="#8B6535"/>
    <!-- Water dripping from spigot -->
    <circle cx="104" cy="105" r="2.5" fill="#7BAFD4" opacity="0.8"/>
    <circle cx="104" cy="118" r="2" fill="#7BAFD4" opacity="0.6"/>
  </g>

  <!-- Water stream from downspout into barrel -->
  <path d="M197 388 Q194 398 190 408" stroke="#7BAFD4" stroke-width="6" stroke-linecap="round" opacity="0.7"/>

  <!-- Height indicator for PSI context (water surface to spigot) -->
  <g transform="translate(270, 380)">
    <line x1="0" y1="0" x2="0" y2="65" stroke="#3A4A2A" stroke-width="2" stroke-dasharray="4 3"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#3A4A2A" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6" y1="65" x2="6" y2="65" stroke="#3A4A2A" stroke-width="2" stroke-linecap="round"/>
    <rect x="12" y="20" width="90" height="22" rx="5" fill="#3A4A2A"/>
    <text x="57" y="35" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#F5F1E8" text-anchor="middle">height → PSI</text>
  </g>

  <!-- Grass tufts -->
  <g fill="#9AB870" opacity="0.7">
    <path d="M40 410 Q38 402 40 396 Q42 402 40 410Z"/>
    <path d="M700 410 Q698 402 700 396 Q702 402 700 410Z"/>
    <path d="M740 415 Q737 405 740 398 Q743 405 740 415Z"/>
  </g>
</svg>
