<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="A row of nesting nursery pots in increasing sizes, from a small starter pot to a large gallon container">
  <!-- Background -->
  <rect width="800" height="500" fill="#F5F1E8"/>
  <rect x="0" y="0" width="800" height="190" fill="#EDE7D6"/>
  <path d="M0 190 Q200 155 400 175 T800 180 V210 H0 Z" fill="#D4DCC4" opacity="0.5"/>
  <circle cx="700" cy="80" r="30" fill="#F0D878" opacity="0.7"/>
  <circle cx="700" cy="80" r="22" fill="#F0C850" opacity="0.6"/>

  <!-- Ground -->
  <rect x="0" y="420" width="800" height="80" fill="#C8D9A8"/>
  <g fill="#9AB870" opacity="0.7">
    <path d="M60 420 Q58 410 60 402 Q62 410 60 420Z"/>
    <path d="M740 420 Q738 410 740 402 Q742 410 740 420Z"/>
  </g>

  <!-- Row of pots, small to large, left to right -->
  <!-- Pot 1: 4in -->
  <g transform="translate(90,360)">
    <path d="M0 0 L44 0 L50 60 L-6 60 Z" fill="#B5652F"/>
    <path d="M0 0 L44 0 L46 10 L-2 10 Z" fill="#9C5527"/>
    <ellipse cx="22" cy="12" rx="20" ry="5" fill="#6B8E4E"/>
  </g>
  <text x="112" y="435" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#3A4A2A" text-anchor="middle">4 in</text>

  <!-- Pot 2: 6in -->
  <g transform="translate(220,330)">
    <path d="M0 0 L62 0 L70 90 L-8 90 Z" fill="#B5652F"/>
    <path d="M0 0 L62 0 L65 13 L-3 13 Z" fill="#9C5527"/>
    <ellipse cx="31" cy="15" rx="28" ry="7" fill="#6B8E4E"/>
    <ellipse cx="31" cy="-2" rx="20" ry="14" fill="#7A9C5E"/>
  </g>
  <text x="255" y="435" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#3A4A2A" text-anchor="middle">6 in / 1 gal</text>

  <!-- Pot 3: 8.5in / 2gal -->
  <g transform="translate(380,290)">
    <path d="M0 0 L86 0 L96 130 L-10 130 Z" fill="#B5652F"/>
    <path d="M0 0 L86 0 L90 17 L-4 17 Z" fill="#9C5527"/>
    <ellipse cx="43" cy="19" rx="38" ry="9" fill="#6B8E4E"/>
    <ellipse cx="43" cy="-8" rx="30" ry="20" fill="#7A9C5E"/>
    <ellipse cx="30" cy="-18" rx="18" ry="14" fill="#89AD6B"/>
  </g>
  <text x="428" y="435" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#3A4A2A" text-anchor="middle">8 in / 2 gal</text>

  <!-- Pot 4: 3gal -->
  <g transform="translate(560,255)">
    <path d="M0 0 L106 0 L118 165 L-12 165 Z" fill="#B5652F"/>
    <path d="M0 0 L106 0 L111 21 L-5 21 Z" fill="#9C5527"/>
    <ellipse cx="53" cy="23" rx="47" ry="11" fill="#6B8E4E"/>
    <ellipse cx="53" cy="-10" rx="38" ry="26" fill="#7A9C5E"/>
    <ellipse cx="35" cy="-24" rx="22" ry="17" fill="#89AD6B"/>
    <ellipse cx="70" cy="-20" rx="20" ry="15" fill="#89AD6B"/>
  </g>
  <text x="619" y="435" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#3A4A2A" text-anchor="middle">3 gal</text>

  <!-- Growth arrow -->
  <g>
    <path d="M100 460 L680 460" stroke="#3A4A2A" stroke-width="2" stroke-dasharray="5 4"/>
    <path d="M670 453 L682 460 L670 467" stroke="#3A4A2A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g>
    <rect x="330" y="30" width="140" height="30" rx="6" fill="#3A4A2A" opacity="0.9"/>
    <text x="400" y="50" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#F5F1E8" text-anchor="middle">Sizing up gradually</text>
  </g>
</svg>
