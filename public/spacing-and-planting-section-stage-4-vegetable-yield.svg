<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgs4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <linearGradient id="basketG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8975C"/>
      <stop offset="100%" stop-color="#8B6535"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgs4)"/>
  <ellipse cx="200" cy="222" rx="120" ry="12" fill="#000" opacity="0.15"/>

  <!-- harvest basket -->
  <path d="M110 150 L290 150 L270 215 L130 215 Z" fill="url(#basketG)"/>
  <g stroke="#6b4c24" stroke-width="1.5" opacity="0.4">
    <line x1="120" y1="165" x2="280" y2="165"/>
    <line x1="124" y1="185" x2="276" y2="185"/>
    <line x1="128" y1="203" x2="272" y2="203"/>
  </g>
  <path d="M130 150 Q200 120 270 150" fill="none" stroke="#8B6535" stroke-width="6"/>

  <!-- vegetables spilling out of basket -->
  <circle cx="150" cy="140" r="16" fill="#c0392b"/>
  <circle cx="150" cy="140" r="16" fill="none" stroke="#8e2a1f" stroke-width="1"/>
  <circle cx="185" cy="130" r="14" fill="#e67e22"/>
  <circle cx="220" cy="138" r="15" fill="#c0392b"/>
  <ellipse cx="255" cy="135" rx="16" ry="11" fill="#4A7C59"/>
  <ellipse cx="120" cy="150" rx="14" ry="10" fill="#6b9e47"/>

  <!-- scale/weight callout -->
  <g transform="translate(280,40)">
    <rect x="0" y="0" width="100" height="45" rx="8" fill="#ffffff" stroke="#c9b896" stroke-width="1"/>
    <text x="50" y="20" font-family="Arial, sans-serif" font-size="10" fill="#5C4433" text-anchor="middle" font-weight="600">Est. yield</text>
    <text x="50" y="36" font-family="Arial, sans-serif" font-size="12" fill="#3D6647" text-anchor="middle" font-weight="700">lbs / bed</text>
  </g>

  <text x="200" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#5C4433" text-anchor="middle">Stage 4: Harvest, weighed and counted</text>
</svg>
