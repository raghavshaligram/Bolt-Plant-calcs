<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgip2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <linearGradient id="potSm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9915a"/>
      <stop offset="100%" stop-color="#9c6b3e"/>
    </linearGradient>
    <linearGradient id="potMd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8975C"/>
      <stop offset="100%" stop-color="#8B6535"/>
    </linearGradient>
    <linearGradient id="potLg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a9773f"/>
      <stop offset="100%" stop-color="#6b4c24"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgip2)"/>
  <line x1="0" y1="210" x2="400" y2="210" stroke="#c9b896" stroke-width="1" opacity="0.6"/>

  <!-- root-bound plant being sized up: small pot -->
  <ellipse cx="80" cy="205" rx="30" ry="7" fill="#000" opacity="0.15"/>
  <path d="M58 205 L64 168 L96 168 L102 205 Z" fill="url(#potSm)"/>
  <ellipse cx="80" cy="168" rx="19" ry="5" fill="#7a5228"/>
  <ellipse cx="65" cy="150" rx="16" ry="9" fill="#3D6647" transform="rotate(-15 65 150)"/>
  <ellipse cx="95" cy="145" rx="16" ry="9" fill="#4A7C59" transform="rotate(15 95 145)"/>
  <text x="80" y="225" font-family="Arial, sans-serif" font-size="10" fill="#5C4433" text-anchor="middle">Current</text>

  <!-- arrow -->
  <path d="M120 175 L160 175" stroke="#5C4433" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#5C4433"/>
    </marker>
  </defs>

  <!-- next size up: medium pot -->
  <ellipse cx="220" cy="205" rx="38" ry="8" fill="#000" opacity="0.15"/>
  <path d="M190 205 L198 158 L242 158 L250 205 Z" fill="url(#potMd)"/>
  <ellipse cx="220" cy="158" rx="24" ry="6" fill="#6b4c24"/>
  <ellipse cx="200" cy="135" rx="21" ry="12" fill="#4A7C59" transform="rotate(-15 200 135)"/>
  <ellipse cx="240" cy="128" rx="21" ry="12" fill="#5a8f63" transform="rotate(15 240 128)"/>
  <ellipse cx="220" cy="115" rx="18" ry="10" fill="#6fa36f"/>
  <text x="220" y="225" font-family="Arial, sans-serif" font-size="10" fill="#3D6647" text-anchor="middle" font-weight="600">Next size up</text>

  <!-- reference: pot size ruler markers -->
  <g font-family="Arial, sans-serif" font-size="9" fill="#8a7a5f">
    <text x="320" y="200">6 in</text>
    <text x="320" y="180">8 in</text>
    <text x="320" y="160">10 in</text>
  </g>
  <line x1="345" y1="205" x2="345" y2="150" stroke="#c9b896" stroke-width="1.5"/>
  <line x1="340" y1="205" x2="350" y2="205" stroke="#c9b896" stroke-width="1.5"/>
  <line x1="340" y1="182" x2="350" y2="182" stroke="#c9b896" stroke-width="1.5"/>
  <line x1="340" y1="160" x2="350" y2="160" stroke="#c9b896" stroke-width="1.5"/>
</svg>
