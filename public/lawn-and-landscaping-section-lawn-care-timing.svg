<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bggl3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <linearGradient id="grassStrip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6FA36F"/>
      <stop offset="100%" stop-color="#3D6647"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bggl3)"/>

  <!-- calendar card -->
  <rect x="60" y="40" width="280" height="150" rx="10" fill="#ffffff" stroke="#c9b896" stroke-width="1"/>
  <rect x="60" y="40" width="280" height="28" rx="10" fill="#3D6647"/>
  <rect x="60" y="58" width="280" height="10" fill="#3D6647"/>
  <circle cx="90" cy="54" r="4" fill="#F5F1E8"/>
  <circle cx="310" cy="54" r="4" fill="#F5F1E8"/>

  <!-- season columns -->
  <g font-family="Arial, sans-serif" font-size="10" fill="#5C4433" text-anchor="middle">
    <text x="115" y="85" font-weight="700">SPRING</text>
    <text x="200" y="85" font-weight="700">SUMMER</text>
    <text x="285" y="85" font-weight="700">FALL</text>
  </g>
  <line x1="153" y1="75" x2="153" y2="175" stroke="#EDE4D0" stroke-width="2"/>
  <line x1="247" y1="75" x2="247" y2="175" stroke="#EDE4D0" stroke-width="2"/>

  <!-- highlight bars: cool-season best window in fall, secondary spring; warm-season in late spring/summer -->
  <rect x="70" y="100" width="70" height="14" rx="4" fill="#3D6647" opacity="0.35"/>
  <text x="105" y="110" font-family="Arial, sans-serif" font-size="8" fill="#3D6647" text-anchor="middle">cool-season (2nd)</text>

  <rect x="165" y="125" width="70" height="14" rx="4" fill="#6b9e47" opacity="0.55"/>
  <text x="200" y="135" font-family="Arial, sans-serif" font-size="8" fill="#4d7a34" text-anchor="middle">warm-season</text>

  <rect x="255" y="100" width="70" height="14" rx="4" fill="#3D6647" opacity="0.8"/>
  <text x="290" y="110" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">cool-season (best)</text>

  <rect x="255" y="150" width="70" height="14" rx="4" fill="#E8A94A" opacity="0.7"/>
  <text x="290" y="160" font-family="Arial, sans-serif" font-size="8" fill="#5C4433" text-anchor="middle">overseed Bermuda</text>

  <!-- grass strip footer -->
  <rect x="0" y="210" width="400" height="40" fill="url(#grassStrip)"/>
  <g stroke="#2c4d33" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <path d="M20 212 q2 -10 -1 -18"/>
    <path d="M60 212 q-2 -8 2 -16"/>
    <path d="M100 212 q2 -10 -2 -18"/>
    <path d="M140 212 q-2 -8 2 -14"/>
    <path d="M180 212 q2 -10 -1 -18"/>
    <path d="M220 212 q-2 -8 2 -16"/>
    <path d="M260 212 q2 -10 -2 -18"/>
    <path d="M300 212 q-2 -8 2 -14"/>
    <path d="M340 212 q2 -10 -1 -18"/>
    <path d="M380 212 q-2 -8 2 -16"/>
  </g>
</svg>
