<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A mature tree with a properly mulched ring around its base showing the trunk gap, alongside an inset cross-section of its growth rings">
  <defs>
    <linearGradient id="tsBg" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#FBE7C4"/>
    </linearGradient>
    <radialGradient id="tsSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A94A" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#E8A94A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E8A94A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tsTrunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6535"/>
      <stop offset="100%" stop-color="#5C4433"/>
    </linearGradient>
    <linearGradient id="tsMulch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B98A4E"/>
      <stop offset="100%" stop-color="#8B6535"/>
    </linearGradient>
    <linearGradient id="tsCanopy1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6FA36F"/>
      <stop offset="100%" stop-color="#3D6647"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#tsBg)"/>
  <circle cx="1080" cy="80" r="220" fill="url(#tsSun)"/>

  <rect x="0" y="330" width="1200" height="70" fill="#3D6647" opacity="0.12"/>
  <line x1="0" y1="330" x2="1200" y2="330" stroke="#3a2810" stroke-width="3" opacity="0.4"/>

  <!-- mature tree, left/center -->
  <path d="M330 330 L370 330 L378 210 L322 210 Z" fill="url(#tsTrunk)" stroke="#3a2810" stroke-width="5"/>
  <ellipse cx="260" cy="150" rx="95" ry="70" fill="url(#tsCanopy1)" stroke="#2c4d33" stroke-width="4"/>
  <ellipse cx="380" cy="120" rx="110" ry="80" fill="#4A7C59" stroke="#2c4d33" stroke-width="4"/>
  <ellipse cx="460" cy="165" rx="80" ry="60" fill="url(#tsCanopy1)" stroke="#2c4d33" stroke-width="4"/>

  <!-- mulch ring around base, with trunk gap -->
  <path d="M180 330 L295 330 L308 305 L392 305 L405 330 L520 330 L520 315 L405 315 L392 290 L308 290 L295 315 L180 315 Z"
        fill="url(#tsMulch)" stroke="#3a2810" stroke-width="4"/>
  <g opacity="0.6" stroke="#5a3d1c" stroke-width="2">
    <line x1="200" y1="322" x2="240" y2="330"/>
    <line x1="260" y1="330" x2="290" y2="320"/>
    <line x1="420" y1="322" x2="460" y2="330"/>
    <line x1="470" y1="330" x2="500" y2="320"/>
  </g>
  <!-- gap callout -->
  <line x1="308" y1="345" x2="392" y2="345" stroke="#5C4433" stroke-width="2"/>
  <line x1="308" y1="340" x2="308" y2="350" stroke="#5C4433" stroke-width="2"/>
  <line x1="392" y1="340" x2="392" y2="350" stroke="#5C4433" stroke-width="2"/>
  <text x="350" y="365" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#5C4433" text-anchor="middle">trunk gap</text>

  <ellipse cx="350" cy="332" rx="180" ry="12" fill="#2a1c0e" opacity="0.2"/>

  <!-- inset: growth rings cross-section, right side -->
  <g transform="translate(920,200)">
    <circle r="150" fill="#F5F1E8" stroke="#3a2810" stroke-width="6"/>
    <circle r="128" fill="none" stroke="#B98A4E" stroke-width="10"/>
    <circle r="102" fill="none" stroke="#8B6535" stroke-width="9"/>
    <circle r="78" fill="none" stroke="#B98A4E" stroke-width="8"/>
    <circle r="56" fill="none" stroke="#8B6535" stroke-width="7"/>
    <circle r="36" fill="none" stroke="#B98A4E" stroke-width="6"/>
    <circle r="18" fill="#6B4C24"/>
    <line x1="0" y1="0" x2="150" y2="0" stroke="#3a2810" stroke-width="2" stroke-dasharray="3 5"/>
    <text x="70" y="-8" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#5C4433" text-anchor="middle">1 ring = 1 year</text>
  </g>

  <text x="350" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5C4433" text-anchor="middle">Mulch it right</text>
  <text x="920" y="380" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#5C4433" text-anchor="middle">Know its age</text>
</svg>
