<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgw1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <linearGradient id="roofG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a95a0"/>
      <stop offset="100%" stop-color="#5c6470"/>
    </linearGradient>
    <linearGradient id="barrelG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90b8"/>
      <stop offset="100%" stop-color="#2c5f7a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgw1)"/>

  <!-- roof slope -->
  <path d="M20 100 L200 40 L380 100 L380 115 L200 55 L20 115 Z" fill="url(#roofG)"/>
  <!-- gutter -->
  <rect x="20" y="112" width="150" height="8" rx="3" fill="#3a3f47"/>

  <!-- rain -->
  <g stroke="#8FC4DE" stroke-width="2" opacity="0.6" stroke-linecap="round">
    <line x1="60" y1="20" x2="55" y2="35"/>
    <line x1="100" y1="15" x2="95" y2="30"/>
    <line x1="140" y1="20" x2="135" y2="35"/>
    <line x1="180" y1="12" x2="175" y2="27"/>
  </g>

  <!-- downspout to barrel -->
  <rect x="85" y="118" width="10" height="55" rx="2" fill="#5c6470"/>

  <!-- rain barrel -->
  <ellipse cx="90" cy="228" rx="42" ry="9" fill="#000" opacity="0.15"/>
  <path d="M50 178 L130 178 L124 225 Q90 235 56 225 Z" fill="url(#barrelG)"/>
  <ellipse cx="90" cy="178" rx="40" ry="9" fill="#3a7896"/>
  <g stroke="#1e4a5f" stroke-width="1.5" opacity="0.4">
    <line x1="55" y1="195" x2="122" y2="195"/>
    <line x1="53" y1="210" x2="124" y2="210"/>
  </g>
  <!-- spigot -->
  <rect x="118" y="205" width="12" height="6" rx="2" fill="#2c5f7a"/>
  <circle cx="132" cy="208" r="3" fill="#2c5f7a"/>

  <!-- gallon count callout -->
  <g transform="translate(240,150)">
    <rect x="0" y="0" width="130" height="60" rx="10" fill="#ffffff" stroke="#c9b896" stroke-width="1"/>
    <text x="65" y="24" font-family="Arial, sans-serif" font-size="11" fill="#5C4433" text-anchor="middle" font-weight="600">1 in rain</text>
    <text x="65" y="42" font-family="Arial, sans-serif" font-size="11" fill="#4A90B8" text-anchor="middle" font-weight="700">≈ 0.623 gal/sq ft</text>
  </g>
</svg>
