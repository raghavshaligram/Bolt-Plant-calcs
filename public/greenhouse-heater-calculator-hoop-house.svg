<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="A heated hoop-house greenhouse glowing warm inside against a cold, snowy outside, illustrating greenhouse heat loss">
  <!-- Background: cold winter sky -->
  <rect width="800" height="500" fill="#E4EDF0"/>
  <rect x="0" y="0" width="800" height="360" fill="#DCE7EC"/>

  <!-- Distant snowy hills -->
  <path d="M0 360 Q200 320 400 345 T800 335 V380 H0 Z" fill="#EFF4F2" opacity="0.8"/>

  <!-- Falling snow (outside, cold) -->
  <g fill="#FFFFFF" opacity="0.9">
    <circle cx="60" cy="90" r="3.5"/>
    <circle cx="120" cy="150" r="2.5"/>
    <circle cx="90" cy="230" r="3"/>
    <circle cx="40" cy="300" r="2.5"/>
    <circle cx="700" cy="80" r="3"/>
    <circle cx="740" cy="160" r="2.5"/>
    <circle cx="760" cy="240" r="3.5"/>
    <circle cx="710" cy="310" r="2.5"/>
    <circle cx="150" cy="80" r="2"/>
    <circle cx="650" cy="120" r="2"/>
  </g>

  <!-- Ground: snow outside, warm soil inside the hoop house -->
  <rect x="0" y="380" width="800" height="120" fill="#F2F6F5"/>

  <!-- Hoop house structure (semicircular Quonset shape) -->
  <g>
    <!-- Poly film covering, translucent -->
    <path d="M120 400 A280 240 0 0 1 680 400 Z" fill="#CFE7EE" opacity="0.55"/>
    <path d="M120 400 A280 240 0 0 1 680 400 Z" stroke="#8FA8B0" stroke-width="3" fill="none"/>

    <!-- End wall (near end, showing depth) -->
    <path d="M120 400 A280 240 0 0 1 680 400" stroke="#6E8890" stroke-width="1" fill="none" opacity="0.4"/>

    <!-- Structural ribs -->
    <path d="M180 400 A280 240 0 0 1 210 250" stroke="#5A6B72" stroke-width="4" fill="none" opacity="0.7"/>
    <path d="M300 400 A280 240 0 0 1 305 180" stroke="#5A6B72" stroke-width="4" fill="none" opacity="0.7"/>
    <path d="M400 400 L400 160" stroke="#5A6B72" stroke-width="4" opacity="0.7"/>
    <path d="M500 400 A280 240 0 0 0 495 180" stroke="#5A6B72" stroke-width="4" fill="none" opacity="0.7"/>
    <path d="M620 400 A280 240 0 0 0 590 250" stroke="#5A6B72" stroke-width="4" fill="none" opacity="0.7"/>

    <!-- Base rails -->
    <rect x="112" y="396" width="16" height="10" rx="2" fill="#8B6535"/>
    <rect x="672" y="396" width="16" height="10" rx="2" fill="#8B6535"/>
  </g>

  <!-- Warm glow inside the greenhouse -->
  <path d="M130 398 A270 232 0 0 1 670 398 Z" fill="#F7C873" opacity="0.22"/>

  <!-- Heater unit inside, glowing -->
  <g transform="translate(330, 340)">
    <rect x="-34" y="0" width="68" height="42" rx="6" fill="#3D6647"/>
    <rect x="-34" y="0" width="68" height="10" rx="4" fill="#4A7C59"/>
    <circle cx="0" cy="24" r="12" fill="#E8A94A"/>
    <circle cx="0" cy="24" r="7" fill="#F7C873"/>
    <!-- Heat wave lines rising -->
    <path d="M-14 -6 Q-18 -18 -12 -30 Q-6 -42 -10 -54" stroke="#E8A94A" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M4 -6 Q0 -18 6 -30 Q12 -42 8 -54" stroke="#E8A94A" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M20 -6 Q16 -18 22 -30 Q28 -42 24 -54" stroke="#E8A94A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Plants growing inside, warm and green -->
  <g fill="#4A7C59">
    <path d="M460 400 Q456 380 462 366 Q468 380 464 400 Z"/>
    <path d="M480 400 Q474 375 482 358 Q490 375 486 400 Z"/>
    <path d="M500 400 Q496 384 502 372 Q508 384 504 400 Z"/>
    <path d="M520 400 Q514 378 522 362 Q530 378 524 400 Z"/>
  </g>
  <g fill="#3D6647" opacity="0.6">
    <path d="M200 400 Q196 386 202 376 Q208 386 204 400 Z"/>
    <path d="M220 400 Q214 382 222 368 Q230 382 224 400 Z"/>
  </g>

  <!-- Thermometer comparison: cold outside vs warm inside -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="118" height="46" rx="8" fill="#3A4A2A" opacity="0.85"/>
    <circle cx="20" cy="23" r="8" fill="#CFE7EE"/>
    <text x="36" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#F5F1E8">Outside</text>
    <text x="36" y="34" font-family="Inter, sans-serif" font-size="10" fill="#DDE8DA">record low &deg;F</text>
  </g>

  <g transform="translate(640, 40)">
    <rect x="0" y="0" width="120" height="46" rx="8" fill="#3D6647" opacity="0.9"/>
    <circle cx="20" cy="23" r="8" fill="#F7C873"/>
    <text x="36" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#F5F1E8">Inside</text>
    <text x="36" y="34" font-family="Inter, sans-serif" font-size="10" fill="#EAD9B0">desired &deg;F</text>
  </g>

  <!-- Bare winter tree outside, left of the hoop house -->
  <g transform="translate(60, 260)" opacity="0.7">
    <rect x="-4" y="40" width="8" height="70" fill="#8B6535"/>
    <path d="M0 40 L-24 10 M0 40 L-30 30 M0 40 L24 8 M0 40 L28 28 M0 40 L0 -6" stroke="#7A5C3E" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
