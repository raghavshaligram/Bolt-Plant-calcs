<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <radialGradient id="pileTop" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#8A6644"/>
      <stop offset="100%" stop-color="#4E3822"/>
    </radialGradient>
    <radialGradient id="pileGarden" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#5C4433"/>
      <stop offset="100%" stop-color="#2E2010"/>
    </radialGradient>
    <radialGradient id="pileCompost" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#4A3823"/>
      <stop offset="100%" stop-color="#241A0D"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgg)"/>
  <line x1="0" y1="205" x2="400" y2="205" stroke="#c9b896" stroke-width="1" opacity="0.6"/>

  <!-- Topsoil mound -->
  <ellipse cx="80" cy="205" rx="60" ry="12" fill="url(#shadow)"/>
  <path d="M25 205 Q30 150 80 140 Q130 150 135 205 Z" fill="url(#pileTop)"/>
  <path d="M25 205 Q30 150 80 140 Q130 150 135 205 Z" fill="none" stroke="#3a2a18" stroke-width="0.5" opacity="0.3"/>
  <g opacity="0.55">
    <circle cx="55" cy="185" r="2.2" fill="#3a2a18"/>
    <circle cx="95" cy="170" r="1.8" fill="#3a2a18"/>
    <circle cx="70" cy="160" r="1.5" fill="#c9a876"/>
    <circle cx="105" cy="195" r="2" fill="#3a2a18"/>
    <circle cx="60" cy="200" r="1.6" fill="#c9a876"/>
    <circle cx="90" cy="150" r="1.4" fill="#3a2a18"/>
  </g>
  <text x="80" y="228" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#5C4433" text-anchor="middle">Topsoil</text>

  <!-- Garden soil mound (center, larger, richer, with compost flecks) -->
  <ellipse cx="200" cy="205" rx="68" ry="13" fill="url(#shadow)"/>
  <path d="M138 205 Q142 138 200 125 Q258 138 262 205 Z" fill="url(#pileGarden)"/>
  <path d="M138 205 Q142 138 200 125 Q258 138 262 205 Z" fill="none" stroke="#1a1006" stroke-width="0.5" opacity="0.3"/>
  <g opacity="0.7">
    <circle cx="175" cy="175" r="2.5" fill="#7a5a34"/>
    <circle cx="220" cy="160" r="2" fill="#7a5a34"/>
    <circle cx="195" cy="145" r="1.8" fill="#8B6535"/>
    <circle cx="230" cy="190" r="2.2" fill="#7a5a34"/>
    <circle cx="165" cy="195" r="1.6" fill="#8B6535"/>
    <circle cx="210" cy="205" r="2" fill="#7a5a34"/>
    <circle cx="185" cy="160" r="1.4" fill="#4a7c59" opacity="0.6"/>
    <circle cx="240" cy="170" r="1.3" fill="#4a7c59" opacity="0.6"/>
  </g>
  <text x="200" y="228" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#3D6647" text-anchor="middle">Garden Soil</text>

  <!-- Compost mound -->
  <ellipse cx="325" cy="205" rx="55" ry="11" fill="url(#shadow)"/>
  <path d="M275 205 Q280 155 325 145 Q370 155 375 205 Z" fill="url(#pileCompost)"/>
  <path d="M275 205 Q280 155 325 145 Q370 155 375 205 Z" fill="none" stroke="#0f0a04" stroke-width="0.5" opacity="0.3"/>
  <g opacity="0.6">
    <circle cx="305" cy="180" r="2" fill="#6b4c24"/>
    <circle cx="340" cy="170" r="1.8" fill="#6b4c24"/>
    <circle cx="320" cy="195" r="2.2" fill="#8B6535"/>
    <circle cx="350" cy="195" r="1.6" fill="#6b4c24"/>
    <circle cx="300" cy="200" r="1.4" fill="#8B6535"/>
  </g>
  <text x="325" y="228" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#6b4c24" text-anchor="middle">Compost</text>
</svg>
