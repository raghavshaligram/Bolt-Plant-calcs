<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Split view of a lawn: bare soil being seeded with a spreader on the left, existing thin turf being overseeded on the right">
  <defs>
    <linearGradient id="lnBg" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#FBE7C4"/>
    </linearGradient>
    <radialGradient id="lnSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A94A" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#E8A94A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E8A94A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lnBareSoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A5A3A"/>
      <stop offset="100%" stop-color="#4E3822"/>
    </linearGradient>
    <linearGradient id="lnTurfSoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B4E33"/>
      <stop offset="100%" stop-color="#3A281A"/>
    </linearGradient>
    <linearGradient id="lnGrass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6FA36F"/>
      <stop offset="100%" stop-color="#3D6647"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#lnBg)"/>
  <circle cx="1080" cy="80" r="220" fill="url(#lnSun)"/>

  <!-- ground band, split -->
  <rect x="0" y="270" width="600" height="130" fill="url(#lnBareSoil)"/>
  <rect x="600" y="270" width="600" height="130" fill="url(#lnTurfSoil)"/>
  <line x1="0" y1="270" x2="1200" y2="270" stroke="#3a2810" stroke-width="5"/>
  <line x1="600" y1="270" x2="600" y2="400" stroke="#3a2810" stroke-width="4" stroke-dasharray="2 10" opacity="0.5"/>

  <!-- LEFT: bare soil texture speckles -->
  <g opacity="0.5" fill="#2a1c0e">
    <circle cx="90" cy="300" r="4"/>
    <circle cx="180" cy="330" r="3.5"/>
    <circle cx="260" cy="305" r="4"/>
    <circle cx="360" cy="340" r="3"/>
    <circle cx="450" cy="310" r="4"/>
  </g>

  <!-- LEFT: person with spreader, simplified bold figure -->
  <g transform="translate(150,150)">
    <circle cx="0" cy="0" r="18" fill="#F5B36A" stroke="#3a2810" stroke-width="3"/>
    <path d="M-14 20 L14 20 L20 120 L-20 120 Z" fill="#4A90B8" stroke="#3a2810" stroke-width="4"/>
    <path d="M14 40 L60 90" stroke="#3a2810" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- spreader hopper -->
  <g transform="translate(230,225)">
    <path d="M-25 0 L25 0 L18 35 L-18 35 Z" fill="#E8A94A" stroke="#3a2810" stroke-width="3"/>
    <circle cx="0" cy="45" r="12" fill="#3a2810"/>
  </g>
  <!-- seed arc scatter, bold dots -->
  <g fill="#5C4433">
    <circle cx="290" cy="255" r="4"/>
    <circle cx="320" cy="265" r="3.5"/>
    <circle cx="350" cy="258" r="4"/>
    <circle cx="380" cy="270" r="3"/>
    <circle cx="410" cy="260" r="4"/>
    <circle cx="440" cy="268" r="3.5"/>
  </g>
  <path d="M255 245 Q340 225 450 260" fill="none" stroke="#E8A94A" stroke-width="3" stroke-dasharray="4 8" opacity="0.7"/>

  <!-- RIGHT: existing thin turf blades -->
  <g stroke="#3D6647" stroke-width="5" stroke-linecap="round" opacity="0.85">
    <line x1="700" y1="270" x2="695" y2="235"/>
    <line x1="730" y1="270" x2="738" y2="230"/>
    <line x1="760" y1="270" x2="752" y2="238"/>
    <line x1="800" y1="270" x2="805" y2="232"/>
    <line x1="840" y1="270" x2="832" y2="240"/>
    <line x1="880" y1="270" x2="888" y2="230"/>
    <line x1="920" y1="270" x2="915" y2="238"/>
    <line x1="960" y1="270" x2="968" y2="235"/>
    <line x1="1000" y1="270" x2="992" y2="240"/>
    <line x1="1040" y1="270" x2="1048" y2="232"/>
    <line x1="1080" y1="270" x2="1072" y2="238"/>
    <line x1="1120" y1="270" x2="1128" y2="230"/>
  </g>
  <!-- new seed falling onto turf -->
  <g fill="#E8A94A">
    <circle cx="750" cy="200" r="5"/>
    <circle cx="820" cy="180" r="4"/>
    <circle cx="890" cy="210" r="5"/>
    <circle cx="960" cy="185" r="4"/>
    <circle cx="1030" cy="205" r="5"/>
    <circle cx="1090" cy="190" r="4"/>
  </g>
  <g stroke="#E8A94A" stroke-width="2" opacity="0.5" stroke-dasharray="2 6">
    <line x1="750" y1="200" x2="740" y2="260"/>
    <line x1="820" y1="180" x2="815" y2="260"/>
    <line x1="890" y1="210" x2="880" y2="260"/>
    <line x1="960" y1="185" x2="958" y2="260"/>
    <line x1="1030" y1="205" x2="1020" y2="260"/>
  </g>

  <ellipse cx="600" cy="396" rx="580" ry="10" fill="#2a1c0e" opacity="0.2"/>

  <text x="40" y="60" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#5C4433">New lawn</text>
  <text x="1160" y="60" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#5C4433" text-anchor="end">Overseeding</text>
</svg>
