<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgt2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EFE0"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
    <linearGradient id="soilLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A5A3A"/>
      <stop offset="100%" stop-color="#4E3822"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bgt2)"/>
  <rect x="0" y="200" width="400" height="30" fill="url(#soilLine)"/>
  <line x1="200" y1="20" x2="200" y2="230" stroke="#c9b896" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- young tree, small, with visible watering can + shallow roots -->
  <rect x="94" y="150" width="10" height="50" rx="3" fill="#8B6535"/>
  <ellipse cx="80" cy="140" rx="26" ry="18" fill="#6fa36f"/>
  <ellipse cx="110" cy="135" rx="24" ry="16" fill="#4A7C59"/>
  <path d="M99 200 Q80 212 65 200 M99 200 Q118 210 125 198" stroke="#8B6535" stroke-width="2.5" fill="none"/>
  <g transform="translate(35,150)">
    <path d="M0 15 L35 15 L35 32 Q35 38 28 38 L7 38 Q0 38 0 32 Z" fill="#4A90B8"/>
    <path d="M35 20 L55 10" stroke="#4A90B8" stroke-width="4" stroke-linecap="round"/>
  </g>
  <path d="M65 165 L58 195" stroke="#8FC4DE" stroke-width="2" opacity="0.7"/>
  <text x="100" y="222" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#5C4433" text-anchor="middle">Young: frequent, deep water</text>

  <!-- mature tree, large, deep roots, no can (drought tolerant) -->
  <rect x="290" y="110" width="16" height="90" rx="4" fill="#6b4c24"/>
  <ellipse cx="270" cy="95" rx="42" ry="28" fill="#3D6647"/>
  <ellipse cx="320" cy="90" rx="40" ry="26" fill="#4A7C59"/>
  <ellipse cx="298" cy="70" rx="30" ry="20" fill="#5a8f63"/>
  <path d="M298 200 Q270 225 245 220 M298 200 Q330 228 355 218 M298 200 Q298 232 298 240" stroke="#6b4c24" stroke-width="2.5" fill="none" opacity="0.8"/>
  <text x="298" y="222" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#3D6647" text-anchor="middle">Mature: drought-tolerant</text>
</svg>
